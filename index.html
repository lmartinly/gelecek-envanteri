    save(); closeSheet(rec);
  });
  if (r) $('#rm-del', rec.sh)?.addEventListener('click', () => {
    if (cnt){ toast('Önce üründeki ' + cnt + ' ürünü taşı veya sil'); return; }
    confirmSheet({ title:'Odayı sil', body:`<b>${esc(r.name)}</b> ve boş kategorileri silinecek.`, okLabel:'Sil', danger:true }, () => {
      r.deleted = now(); touch(r);
      catsA(r.id).forEach(c => { c.deleted = now(); touch(c); });
      if (invRoom === r.id) invRoom = null;
      save(); closeSheet(rec);
    });
  });
}
function catSheet(roomId, cid){
  const c = cid ? cat(cid) : null;
  const cnt = c ? catProds(c.id).length : 0;
  const rec = openSheet(`
    ${sheetHead(c ? 'Kategoriyi düzenle' : 'Kategori ekle', esc(room(roomId)?.name || ''))}
    <div class="sh-b">
      <div class="fld"><label>Kategori adı</label><input class="inp" id="ct-nm" value="${esc(c?.name || '')}" placeholder="ör. Aydınlatma"></div>
      <button class="btn" id="ct-ok">${c ? 'Kaydet' : 'Ekle'}</button>
      ${c ? `<button class="btn danger" id="ct-del">${I.trash} Kategoriyi sil${cnt ? ` · ${cnt} ürün var` : ''}</button>` : ''}
    </div>`);
  $('#ct-ok', rec.sh).addEventListener('click', () => {
    const nm = $('#ct-nm', rec.sh).value.trim(); if (!nm) return;
    if (c){ c.name = nm; touch(c); }
    else S.cats.push({ id:uid(), roomId, name:nm, order:catsA(roomId).length, updatedAt:now() });
    save(); closeSheet(rec);
  });
  if (c) $('#ct-del', rec.sh)?.addEventListener('click', () => {
    if (cnt){ toast('Önce ' + cnt + ' ürünü taşı veya sil'); return; }
    confirmSheet({ title:'Kategoriyi sil', body:`<b>${esc(c.name)}</b> silinecek.`, okLabel:'Sil', danger:true }, () => { c.deleted = now(); touch(c); save(); closeSheet(rec); });
  });
}
function moveSheet(p, done){
  let rid = p.roomId;
  const rec = openSheet(`
    ${sheetHead('Taşı', esc(p.name))}
    <div class="sh-b">
      <div class="fld"><label>Oda</label><div class="pill-row" id="mv-r"></div></div>
      <div class="fld"><label>Kategori</label><div class="pill-row" id="mv-c"></div></div>
    </div>`);
  const paint = () => {
    $('#mv-r', rec.sh).innerHTML = roomsA().map(r => `<button class="pill ${r.id === rid ? 'on' : ''}" data-r="${r.id}">${esc(r.name)}</button>`).join('');
    $('#mv-c', rec.sh).innerHTML = catsA(rid).map(c => `<button class="pill ${c.id === p.catId ? 'on' : ''}" data-c="${c.id}">${esc(c.name)}</button>`).join('') || `<span style="font-size:12.5px;color:var(--ink-3)">Bu odada kategori yok</span>`;
  };
  paint();
  rec.sh.addEventListener('click', e => {
    const r = e.target.closest('[data-r]'); if (r){ rid = r.dataset.r; paint(); return; }
    const c = e.target.closest('[data-c]');
    if (c){ p.roomId = rid; p.catId = c.dataset.c; p.order = catProds(c.dataset.c).length; touch(p); save(); closeSheet(rec); toast('Taşındı'); done?.(); }
  });
}

/* — insight result list — */
function insListSheet(ids){
  const list = ids.map(prod).filter(Boolean).filter(alive);
  const rec = openSheet(`
    ${sheetHead('Akıllı not', list.length + ' ürün')}
    <div class="sh-b"><div class="plist">${list.map(p => prodRow(p, { ctx:true })).join('')}</div></div>`);
  rec.sh.addEventListener('click', e => {
    const t = e.target.closest('[data-tick]'); if (t){ e.stopPropagation(); toggleTick(t, e); return; }
    const pr = e.target.closest('[data-prod]'); if (pr){ closeSheet(rec); productSheet(pr.dataset.prod); }
  });
}
function toggleTick(el, e){
  const p = prod(el.dataset.tick); if (!p) return;
  if (isDone(p)) setStatus(p, p.prevStatus && !DONE_ST.includes(p.prevStatus) ? p.prevStatus : 'ihtiyac');
  else setStatus(p, 'alindi', e);
}
</script>
<script>
/* ═══════════════════ RENDER DISPATCH + WIRING ═══════════════════ */
function render(){
  renderNav();
  $('#app').innerHTML = ({ home:renderHome, inv:renderInv, wish:renderWish, fin:renderFin, set:renderSet })[TAB]();
  wireInv();
}
function wireInv(){
  if (TAB !== 'inv') return;
  const rs = $('#room-sort');
  if (rs) makeSortable(rs, '.frow', ids => { ids.forEach((id, i) => { const r = room(id); if (r){ r.order = i; touch(r); } }); save({ silent:true }); });
  const cs = $('#cat-sort');
  if (cs) makeSortable(cs, '.catblock', ids => { ids.forEach((id, i) => { const c = cat(id); if (c){ c.order = i; touch(c); } }); save({ silent:true }); });
  $$('[data-psort]', $('#app')).forEach(pl =>
    makeSortable(pl, '.prow', ids => { ids.forEach((id, i) => { const p = prod(id); if (p){ p.order = i; touch(p); } }); save({ silent:true }); }));
}
const qPaint = debounce(() => { const b = $('#inv-body'); if (b){ b.innerHTML = invBody(); wireInv(); } }, 160);

/* ——— global delegation (sheets handle their own clicks) ——— */
function onClick(e){
  if (e.target.closest('.sheet') || e.target.closest('.veil')) return;

  const tab = e.target.closest('[data-tab]');   if (tab){ go(tab.dataset.tab); return; }
  const gg  = e.target.closest('[data-go]');    if (gg){ go(gg.dataset.go); return; }
  if (e.target.closest('#fab')){ quickAdd(); return; }

  const tk = e.target.closest('[data-tick]');   if (tk){ toggleTick(tk, e); return; }
  const pr = e.target.closest('[data-prod]');   if (pr){ productSheet(pr.dataset.prod); return; }
  const rm = e.target.closest('[data-room]');   if (rm){ invRoom = rm.dataset.room; TAB === 'inv' ? render() : go('inv'); return; }
  const ins= e.target.closest('[data-ins]');    if (ins){ try { insListSheet(JSON.parse(ins.dataset.ins)); } catch(_){} return; }

  if (e.target.closest('#wel-ok')){ S.meta.welcomed = true; touch(S.meta); save(); return; }
  if (e.target.closest('#ed-count')){ countdownSheet(); return; }
  if (e.target.closest('#add-room')){ roomSheet(); return; }
  if (e.target.closest('#sort-rooms') || e.target.closest('#sort-toggle')){ sortMode = !sortMode; render(); return; }
  if (e.target.closest('#back-rooms')){ invRoom = null; sortMode = false; render(); return; }
  const er = e.target.closest('[data-edroom]'); if (er){ roomSheet(er.dataset.edroom); return; }
  const ac = e.target.closest('[data-addcat]'); if (ac){ catSheet(ac.dataset.addcat); return; }
  const ec = e.target.closest('[data-edcat]');  if (ec){ const c = cat(ec.dataset.edcat); if (c) catSheet(c.roomId, c.id); return; }
  if (e.target.closest('#open-f')){ filterSheet(); return; }
  if (e.target.closest('#clear-f')){ F.q=''; F.status=[]; F.prio=[]; F.tags=[]; F.roomId=null; render(); return; }

  if (handleAltClick(e)) return;

  const th = e.target.closest('[data-theme-set]'); if (th){ S.settings.theme = th.dataset.themeSet; touch(S.settings); applyTheme(); save(); return; }
  const cu = e.target.closest('[data-cur]');       if (cu){ S.settings.currency = cu.dataset.cur; touch(S.settings); save(); return; }
  if (e.target.closest('#sync-save')){ S.settings.clientId = ($('#cid')?.value || '').trim(); touch(S.settings); persistNow(); toast('Kaydedildi'); render(); return; }
  if (e.target.closest('#sync-on')){ Sync.connect(true); return; }
  if (e.target.closest('#sync-off')){ Sync.disconnect(); return; }
  if (e.target.closest('#exp-json')){ exportJSON(); return; }
  if (e.target.closest('#imp-json')){ $('#imp-file')?.click(); return; }
  if (e.target.closest('#reset-all')){
    confirmSheet({ title:'Her şeyi sıfırla', body:'Tüm odalar, ürünler ve ayarlar <b>bu cihazdan</b> silinir. Drive yedeğin varsa oradan geri dönebilirsin.', okLabel:'Sıfırla', danger:true },
      () => { S = freshState(); S.meta.welcomed = true; persistNow(); render(); toast('Sıfırlandı'); });
    return;
  }
}
function onInput(e){
  if (e.target.id === 'q'){ F.q = e.target.value; qPaint(); }
}
function onChange(e){
  if (e.target.id === 'imp-file'){
    const f = e.target.files[0]; if (!f) return;
    f.text().then(t => {
      const data = JSON.parse(t);
      if (!data || !Array.isArray(data.rooms) || !Array.isArray(data.products)) throw 0;
      const r = Sync.mergeRemote(data);
      persistNow(); render();
      toast(r.changedLocal ? 'Yedek birleştirildi ' + sparkTxt : 'Yedek zaten güncel');
    }).catch(() => toast('Dosya okunamadı — geçerli bir yedek değil'));
    e.target.value = '';
  }
}

/* ——— theme ——— */
const mq = matchMedia('(prefers-color-scheme: dark)');
function applyTheme(){
  const t = S.settings.theme || 'system';
  document.documentElement.dataset.theme = t === 'system' ? (mq.matches ? 'dark' : 'light') : t;
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.content = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
}
mq.addEventListener?.('change', () => { if (S?.settings.theme === 'system') applyTheme(); });

/* ——— export ——— */
function exportJSON(){
  const blob = new Blob([JSON.stringify(S, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gelecek-envanteri-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}
</script>
<script>
/* ═══════════════════ GOOGLE DRIVE SYNC ═══════════════════ */
const Sync = {
  status: 'off',
  lastAt: +(store.read('ge_lastsync') || 0),
  fileId: store.read('ge_fileid') || null,
  token: null, exp: 0, tc: null, pushT: null, gsiP: null, busy: false,

  enabled(){ return store.read('ge_sync') === '1'; },
  authValid(){ return this.token && Date.now() < this.exp - 30e3; },
  setStatus(s){ this.status = s; if (TAB === 'set') render(); },

  loadGsi(){
    if (window.google?.accounts?.oauth2) return Promise.resolve();
    if (this.gsiP) return this.gsiP;
    this.gsiP = new Promise((res, rej) => {
      const sc = document.createElement('script');
      sc.src = 'https://accounts.google.com/gsi/client';
      sc.onload = res; sc.onerror = () => rej(new Error('gsi yüklenemedi'));
      document.head.appendChild(sc);
    });
    return this.gsiP;
  },

  getToken(interactive){
    return this.loadGsi().then(() => new Promise((res, rej) => {
      this.tc = google.accounts.oauth2.initTokenClient({
        client_id: S.settings.clientId,
        scope: 'https://www.googleapis.com/auth/drive.appdata',
        callback: t => {
          if (t.error) return rej(new Error(t.error));
          this.token = t.access_token;
          this.exp = Date.now() + (t.expires_in || 3600) * 1000;
          res();
        },
        error_callback: err => rej(new Error(err?.type || 'auth')),
      });
      this.tc.requestAccessToken({ prompt: '' });
    }));
  },

  async connect(interactive){
    if (!S.settings.clientId){ toast('Önce Client ID gir — adımlar README’de'); return; }
    if (this.busy) return; this.busy = true;
    this.setStatus('syncing');
    try {
      if (!this.authValid()) await this.getToken(interactive);
      store.write('ge_sync', '1');
      await this.fullSync();
      this.setStatus('ok');
      if (interactive) toast('Drive bağlandı ' + sparkTxt);
    } catch (err) {
      console.warn('sync', err);
      this.setStatus(interactive ? 'error' : 'noauth');
      if (interactive) toast('Bağlanamadı — pop-up engelini ve Client ID’yi kontrol et');
    } finally { this.busy = false; }
  },

  disconnect(){
    store.del('ge_sync'); store.del('ge_fileid');
    this.token = null; this.fileId = null;
    this.setStatus('off'); toast('Bağlantı kesildi — veriler cihazda duruyor');
  },

  async api(url, opts = {}){
    const r = await fetch(url, { ...opts, headers: { Authorization: 'Bearer ' + this.token, ...(opts.headers || {}) } });
    if (r.status === 401){ this.token = null; this.setStatus('noauth'); throw new Error('401'); }
    if (!r.ok) throw new Error('drive ' + r.status);
    return r;
  },

  async ensureFile(){
    if (this.fileId) return;
    const q = encodeURIComponent("name='ge-data.json'");
    const r = await this.api(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id)`);
    const { files } = await r.json();
    if (files?.length){ this.fileId = files[0].id; }
    else {
      const meta = JSON.stringify({ name:'ge-data.json', parents:['appDataFolder'] });
      const body = `--geb\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--geb\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(S)}\r\n--geb--`;
      const c = await this.api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method:'POST', headers:{ 'Content-Type':'multipart/related; boundary=geb' }, body });
      this.fileId = (await c.json()).id;
      this.stamp();
    }
    store.write('ge_fileid', this.fileId);
  },

  async pull(){
    const r = await this.api(`https://www.googleapis.com/drive/v3/files/${this.fileId}?alt=media`);
    let remote = null;
    try { remote = await r.json(); } catch(_){ return { aheadLocal:true }; }
    return this.mergeRemote(remote);
  },

  async push(){
    if (!this.enabled() || !S.settings.clientId) return;
    if (!this.authValid()){
      try { await this.getToken(false); } catch(_) { this.setStatus('noauth'); return; }
    }
    try {
      await this.ensureFile();
      /* purge tombstones older than 60 days before upload */
      const cut = now() - 60 * 864e5;
      ['rooms','cats','products'].forEach(k => S[k] = S[k].filter(x => !x.deleted || x.deleted > cut));
      await this.api(`https://www.googleapis.com/upload/drive/v3/files/${this.fileId}?uploadType=media`, {
        method:'PATCH', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(S), keepalive:true });
      this.stamp();
      this.setStatus('ok');
    } catch (err) { console.warn('push', err); if (this.status !== 'noauth') this.setStatus('error'); }
  },

  async fullSync(){
    await this.ensureFile();
    const r = await this.pull();
    if (r.changedLocal){ persistNow(); render(); toast('Drive’dan güncellendi ' + sparkTxt); }
    if (r.aheadLocal) await this.push(); else this.stamp();
  },

  stamp(){ this.lastAt = Date.now(); store.write('ge_lastsync', String(this.lastAt)); },

  queue(){
    if (!this.enabled() || !S.settings.clientId) return;
    clearTimeout(this.pushT);
    this.pushT = setTimeout(() => this.push(), 4000);
  },

  /* entity-level last-write-wins merge; returns what changed on each side */
  mergeRemote(remote){
    let changedLocal = false, aheadLocal = false;
    const mergeArr = key => {
      const loc = new Map((S[key] || []).map(x => [x.id, x]));
      const rem = new Map((remote[key] || []).map(x => [x.id, x]));
      const out = [];
      for (const [id, l] of loc){
        const r = rem.get(id);
        if (!r){ out.push(l); aheadLocal = true; continue; }
        if ((r.updatedAt || 0) > (l.updatedAt || 0)){ out.push(r); changedLocal = true; }
        else { out.push(l); if ((l.updatedAt || 0) > (r.updatedAt || 0)) aheadLocal = true; }
      }
      for (const [id, r] of rem) if (!loc.has(id)){ out.push(r); changedLocal = true; }
      S[key] = out;
    };
    ['rooms','cats','products','tagBank'].forEach(mergeArr);
    if (remote.settings){
      if ((remote.settings.updatedAt || 0) > (S.settings.updatedAt || 0)){ S.settings = { ...S.settings, ...remote.settings }; changedLocal = true; applyTheme(); }
      else if ((S.settings.updatedAt || 0) > (remote.settings.updatedAt || 0)) aheadLocal = true;
    }
    if (remote.meta?.welcomed) S.meta.welcomed = true;
    return { changedLocal, aheadLocal };
  },
};

/* flush pending push when app goes to background */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && Sync.pushT){
    clearTimeout(Sync.pushT); Sync.pushT = null;
    if (Sync.authValid()) Sync.push();
  }
});

/* ═══════════════════ BOOT ═══════════════════ */
load();
applyTheme();
render();
document.addEventListener('click', onClick);
document.addEventListener('input', onInput);
document.addEventListener('change', onChange);
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost'))
  navigator.serviceWorker.register('./sw.js').catch(() => {});
if (Sync.enabled() && S.settings.clientId) setTimeout(() => Sync.connect(false), 900);
</script>
