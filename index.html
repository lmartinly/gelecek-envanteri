<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Gelecek Envanteri</title>
<meta name="description" content="Ev kurulum ve envanter sistemi">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F8EFEA">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14151F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Envanter">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700;800&display=swap">
<style>
/* ————————————————————————————————————————————————
   GELECEK ENVANTERİ · design tokens (deck-derived)
   indigo #3F4DBA · blush #F8EFEA · butter #FCF1C4
   sand #EFE7DA · terra #C96A3A · sage #9BA17B
   plum #A55C7A · brown #4A3C2F
———————————————————————————————————————————————— */
:root{
  --indigo:#3F4DBA; --indigo-deep:#333F9E; --cream:#FCF1C4;
  --terra:#C96A3A; --sage:#9BA17B; --plum:#A55C7A; --brown:#4A3C2F;
  --ochre:#C09A3E;
  --bg:#F8EFEA; --surface:#FFFFFF; --sand:#EFE7DA; --sand-2:#F4EDE2;
  --ink:#3B3229; --ink-2:#8A7E70; --ink-3:#B8AC9C;
  --line:rgba(74,60,47,.10); --line-2:rgba(74,60,47,.16);
  --shadow:0 1px 2px rgba(74,60,47,.04), 0 8px 28px -14px rgba(74,60,47,.18);
  --shadow-lift:0 2px 6px rgba(74,60,47,.06), 0 18px 44px -18px rgba(74,60,47,.28);
  --r-lg:22px; --r-md:16px; --r-sm:11px;
  --serif:'Playfair Display', Georgia, serif;
  --sans:'Manrope', -apple-system, 'Segoe UI', sans-serif;
  --nav-h:64px;
  --ok:#7E9662; --warn:#C96A3A;
  --chip-indigo:rgba(63,77,186,.10); --chip-terra:rgba(201,106,58,.13);
  --chip-sage:rgba(133,150,98,.16); --chip-plum:rgba(165,92,122,.13);
  --on-indigo:#4149A8;
}
html[data-theme="dark"]{
  --bg:#14151F; --surface:#1D1E2E; --sand:#262738; --sand-2:#222334;
  --ink:#EFE8DC; --ink-2:#A79D8F; --ink-3:#6E6759;
  --line:rgba(239,232,220,.08); --line-2:rgba(239,232,220,.14);
  --shadow:0 1px 2px rgba(0,0,0,.2), 0 8px 28px -14px rgba(0,0,0,.5);
  --shadow-lift:0 2px 6px rgba(0,0,0,.3), 0 18px 44px -18px rgba(0,0,0,.6);
  --cream:#F6E9BF;
  --chip-indigo:rgba(133,144,236,.16); --chip-terra:rgba(224,138,94,.16);
  --chip-sage:rgba(155,161,123,.18); --chip-plum:rgba(197,126,155,.16);
  --on-indigo:#A9B2F2; --ochre:#D2AC52; --ok:#A3B786;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font:15px/1.5 var(--sans); letter-spacing:.005em;
  min-height:100dvh; overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
#app{max-width:640px; margin:0 auto; padding:18px 18px calc(var(--nav-h) + 30px + env(safe-area-inset-bottom));}
h1,h2,h3{margin:0; font-weight:600}
button{font:inherit; color:inherit; background:none; border:0; padding:0; cursor:pointer; touch-action:manipulation}
input,select,textarea{font:inherit; color:var(--ink)}
a{color:var(--on-indigo); text-decoration:none}
::placeholder{color:var(--ink-3)}
:focus-visible{outline:2px solid var(--indigo); outline-offset:2px; border-radius:6px}
@media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.01ms!important; transition-duration:.01ms!important} }

/* — type — */
.serif{font-family:var(--serif)}
.eyebrow{
  font-size:10.5px; font-weight:700; letter-spacing:.22em; text-transform:uppercase;
  color:var(--ink-2); display:flex; align-items:center; gap:8px;
}
.eyebrow .sp{color:var(--terra); font-size:11px}
.page-title{font-family:var(--serif); font-size:30px; font-weight:500; letter-spacing:.01em; margin-top:2px}
.page-title em{font-style:italic; font-weight:500}
.section-h{display:flex; align-items:baseline; justify-content:space-between; margin:26px 2px 10px}
.section-h .eyebrow{color:var(--ink-2)}
.section-h .act{font-size:12.5px; font-weight:700; color:var(--on-indigo)}

/* — cards — */
.card{background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--shadow); padding:18px}
.card.sand{background:var(--sand); box-shadow:none}
.hr{height:1px; background:var(--line); margin:14px 0}

/* — hero countdown — */
.hero{
  position:relative; overflow:hidden; color:var(--cream);
  background:linear-gradient(155deg, #4553C4 0%, var(--indigo) 46%, #3A46A6 100%);
  border-radius:26px; padding:26px 22px 22px; box-shadow:var(--shadow-lift);
}
.hero .spark{position:absolute; color:var(--cream); opacity:.9}
.hero .eyebrow{color:var(--cream); opacity:.85; justify-content:center}
.hero-title{font-family:var(--serif); font-style:italic; font-weight:500; font-size:26px; text-align:center; margin-top:10px; line-height:1.15}
.hero-days{font-family:var(--serif); font-size:74px; font-weight:500; line-height:1; text-align:center; margin-top:10px; font-variant-numeric:lining-nums}
.hero-days small{font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:.24em; display:block; margin-top:8px; opacity:.85}
.hero-date{ text-align:center; font-size:12.5px; opacity:.75; margin-top:12px}
.hero-edit{position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%; background:rgba(252,241,196,.14); color:var(--cream); display:grid; place-items:center}
.hero-bar{height:5px; border-radius:99px; background:rgba(252,241,196,.22); margin-top:18px; overflow:hidden}
.hero-bar i{display:block; height:100%; background:var(--cream); border-radius:99px; transition:width .8s cubic-bezier(.22,1,.36,1)}
.hero-meta{display:flex; justify-content:space-between; font-size:11.5px; font-weight:600; letter-spacing:.06em; opacity:.85; margin-top:8px}

/* — stat grid — */
.stats{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px}
.stat{background:var(--surface); border-radius:var(--r-md); box-shadow:var(--shadow); padding:15px 16px 13px}
.stat .lb{font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-2)}
.stat .v{font-family:var(--serif); font-size:26px; font-weight:500; margin-top:5px; font-variant-numeric:lining-nums; line-height:1.1}
.stat .v small{font-size:15px}
.stat .sub{font-size:11.5px; color:var(--ink-2); margin-top:3px}

/* — room cards — */
.rooms{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.room-card{
  border-radius:var(--r-lg); padding:16px 16px 14px; min-height:112px; text-align:left;
  display:flex; flex-direction:column; justify-content:space-between; position:relative;
  box-shadow:var(--shadow); transition:transform .18s ease; width:100%;
}
.room-card:active{transform:scale(.975)}
.room-card .nm{font-family:var(--serif); font-size:18.5px; font-weight:500; line-height:1.15; letter-spacing:.01em}
.room-card .pct{font-family:var(--serif); font-size:26px; font-weight:500}
.room-card .pct sup{font-size:12px; font-weight:600}
.room-card .cnt{font-size:11px; font-weight:600; letter-spacing:.05em; opacity:.75}
.room-card .bar{height:4px; border-radius:99px; background:rgba(0,0,0,.14); overflow:hidden; margin-top:8px}
.room-card .bar i{display:block; height:100%; border-radius:99px; background:currentColor; transition:width .7s cubic-bezier(.22,1,.36,1)}
.room-card.lite .bar{background:rgba(74,60,47,.12)}
.room-row-ft{display:flex; align-items:flex-end; justify-content:space-between; margin-top:12px}

/* — chips & pills — */
.chip{
  display:inline-flex; align-items:center; gap:5px; padding:4px 11px; border-radius:99px;
  font-size:11.5px; font-weight:700; letter-spacing:.02em; white-space:nowrap;
}
.chip.st-ihtiyac{background:var(--sand); color:var(--ink-2)}
.chip.st-arastiriliyor{background:var(--chip-indigo); color:var(--on-indigo)}
.chip.st-wishlist{background:var(--chip-plum); color:var(--plum)}
html[data-theme="dark"] .chip.st-wishlist{color:#D397B4}
.chip.st-alinacak{background:var(--chip-terra); color:var(--terra)}
html[data-theme="dark"] .chip.st-alinacak{color:#E29A70}
.chip.st-alindi{background:var(--chip-sage); color:var(--ok)}
.chip.st-evde{background:var(--chip-sage); color:var(--ok); opacity:.85}
.chip.st-hediye{background:var(--chip-plum); color:var(--plum)}
html[data-theme="dark"] .chip.st-hediye{color:#D397B4}
.pill{
  display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:99px;
  border:1px solid var(--line-2); font-size:12.5px; font-weight:700; color:var(--ink-2);
  background:var(--surface); transition:all .15s ease;
}
.pill.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}
.pill-row{display:flex; gap:8px; flex-wrap:wrap}
.tagchip{display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; background:var(--sand); font-size:11px; font-weight:700; color:var(--ink-2)}
.prio-dot{width:7px; height:7px; border-radius:50%; display:inline-block}
.prio-yuksek{background:var(--terra)} .prio-orta{background:var(--ochre)} .prio-dusuk{background:var(--ink-3)}

/* — product rows — */
.plist{background:var(--surface); border-radius:var(--r-lg); box-shadow:var(--shadow); overflow:hidden}
.prow{display:flex; align-items:center; gap:12px; padding:13px 16px; width:100%; text-align:left; border-bottom:1px solid var(--line); position:relative}
.prow:last-child{border-bottom:0}
.prow:active{background:var(--sand-2)}
.prow .tick{
  width:26px; height:26px; border-radius:50%; border:1.6px solid var(--line-2); flex:none;
  display:grid; place-items:center; color:transparent; transition:all .2s ease; background:var(--surface);
}
.prow .tick.on{background:var(--sage); border-color:var(--sage); color:#fff}
.prow .bd{flex:1; min-width:0}
.prow .nm{font-weight:600; font-size:14.5px; line-height:1.3; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.prow .nm.done{color:var(--ink-3); text-decoration:line-through; text-decoration-color:var(--ink-3); text-decoration-thickness:1px}
.prow .mt{display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-2); margin-top:2px; overflow:hidden; white-space:nowrap}
.prow .pr{font-family:var(--serif); font-size:14.5px; font-variant-numeric:lining-nums; color:var(--ink-2); flex:none}
.cat-h{display:flex; align-items:center; justify-content:space-between; padding:14px 4px 8px; }
.cat-h .t{font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-2)}
.cat-h .n{font-size:11px; color:var(--ink-3); font-weight:700}

/* — search & filter — */
.search{
  display:flex; align-items:center; gap:10px; background:var(--surface); border-radius:99px;
  padding:11px 16px; box-shadow:var(--shadow); margin:14px 0 12px;
}
.search input{flex:1; border:0; background:none; outline:none; font-size:14.5px}
.search svg{color:var(--ink-3); flex:none}
.fbtn{position:relative; flex:none; color:var(--ink-2)}
.fbtn .badge{position:absolute; top:-6px; right:-8px; background:var(--terra); color:#fff; font-size:9.5px; font-weight:800; min-width:16px; height:16px; border-radius:99px; display:grid; place-items:center; padding:0 4px}

/* — FAB — */
.fab{
  position:fixed; right:18px; bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom)); z-index:40;
  width:56px; height:56px; border-radius:50%; background:var(--indigo); color:var(--cream);
  box-shadow:0 10px 30px -8px rgba(63,77,186,.55); display:grid; place-items:center;
  transition:transform .15s ease;
}
.fab:active{transform:scale(.92)}

/* — bottom nav — */
nav.bottom{
  position:fixed; left:0; right:0; bottom:0; z-index:30;
  background:color-mix(in srgb, var(--surface) 88%, transparent);
  -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px);
  border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom);
}
nav.bottom .wrap{max-width:640px; margin:0 auto; display:grid; grid-template-columns:repeat(5,1fr); height:var(--nav-h)}
nav.bottom button{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--ink-3); font-size:9.5px; font-weight:800; letter-spacing:.06em}
nav.bottom button.on{color:var(--ink)}
nav.bottom button.on svg{color:var(--indigo)}
html[data-theme="dark"] nav.bottom button.on svg{color:var(--on-indigo)}

/* — sheets — */
.veil{position:fixed; inset:0; background:rgba(30,25,20,.42); z-index:50; opacity:0; transition:opacity .22s ease}
html[data-theme="dark"] .veil{background:rgba(0,0,0,.55)}
.veil.in{opacity:1}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:51; max-width:640px; margin:0 auto;
  background:var(--bg); border-radius:26px 26px 0 0; box-shadow:var(--shadow-lift);
  transform:translateY(102%); transition:transform .3s cubic-bezier(.22,1,.36,1);
  max-height:90dvh; display:flex; flex-direction:column;
}
.sheet.in{transform:translateY(0)}
.sheet .grab{width:38px; height:4px; border-radius:99px; background:var(--line-2); margin:10px auto 0; flex:none}
.sheet .sh-h{display:flex; align-items:center; justify-content:space-between; padding:12px 20px 6px; flex:none}
.sheet .sh-t{font-family:var(--serif); font-size:21px; font-weight:500}
.sheet .sh-x{width:32px; height:32px; border-radius:50%; background:var(--sand); color:var(--ink-2); display:grid; place-items:center}
.sheet .sh-b{overflow-y:auto; padding:8px 20px calc(24px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling:touch}

/* — forms — */
.fld{margin-top:14px}
.fld label{display:block; font-size:10.5px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-2); margin:0 2px 6px}
.inp, textarea.inp{
  width:100%; border:1px solid var(--line-2); background:var(--surface); border-radius:var(--r-sm);
  padding:12px 14px; font-size:15px; outline:none; transition:border-color .15s;
}
.inp:focus{border-color:var(--indigo)}
textarea.inp{resize:vertical; min-height:84px; line-height:1.5}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%;
  background:var(--indigo); color:var(--cream); font-weight:800; font-size:14.5px; letter-spacing:.03em;
  border-radius:var(--r-md); padding:15px; margin-top:18px; transition:transform .12s ease, opacity .2s;
}
.btn:active{transform:scale(.98)}
.btn[disabled]{opacity:.4; pointer-events:none}
.btn.ghost{background:var(--sand); color:var(--ink)}
.btn.danger{background:var(--chip-terra); color:var(--terra)}
.btn.sm{width:auto; padding:9px 16px; font-size:12.5px; margin-top:0; border-radius:99px}
.two{display:grid; grid-template-columns:1fr 1fr; gap:10px}

/* — product detail rows — */
.sect{background:var(--surface); border-radius:var(--r-md); box-shadow:var(--shadow); margin-top:14px; overflow:hidden}
.sect summary{
  list-style:none; display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; cursor:pointer; font-size:11px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-2);
}
.sect summary::-webkit-details-marker{display:none}
.sect summary .ar{transition:transform .2s ease; color:var(--ink-3)}
.sect[open] summary .ar{transform:rotate(180deg)}
.sect .in{padding:0 16px 14px}
.frow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 0; border-top:1px solid var(--line)}
.frow:first-child{border-top:0}
.frow .k{font-size:12.5px; font-weight:700; color:var(--ink-2); flex:none}
.frow .v{flex:1; text-align:right; font-size:14.5px; font-weight:600; min-width:0}
.frow input, .frow select{border:0; background:none; text-align:right; width:100%; outline:none; font-weight:600; font-size:14.5px; padding:2px 0}
.frow select{-webkit-appearance:none; appearance:none; direction:rtl}
.frow .ghosty{color:var(--ink-3); font-weight:600}
.linkrow{display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--line)}
.linkrow:first-child{border-top:0}
.linkrow .u{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13.5px; font-weight:600; color:var(--on-indigo)}
.linkrow .x{color:var(--ink-3)}

/* — alternatives — */
.alt{display:flex; align-items:center; gap:12px; padding:12px 0; border-top:1px solid var(--line)}
.alt:first-child{border-top:0}
.alt .bd{flex:1; min-width:0}
.alt .nm{font-weight:700; font-size:14px}
.alt .mt{font-size:12px; color:var(--ink-2); margin-top:1px}
.alt.won .nm::after{content:" ✦"; color:var(--terra)}
.alt.arch{opacity:.45}
.alt .pk{flex:none; font-size:11.5px; font-weight:800; color:var(--on-indigo); padding:7px 12px; border:1px solid var(--line-2); border-radius:99px}
.alt .pk.done{color:var(--ok); border-color:transparent; background:var(--chip-sage)}

/* — insights — */
.ins{display:flex; gap:12px; align-items:flex-start; padding:13px 2px; border-top:1px solid var(--line)}
.ins:first-child{border-top:0}
.ins .ic{width:34px; height:34px; border-radius:12px; display:grid; place-items:center; flex:none; margin-top:1px}
.ins .bd{flex:1; min-width:0}
.ins .t{font-weight:700; font-size:13.5px}
.ins .d{font-size:12.5px; color:var(--ink-2); margin-top:1px; line-height:1.45}

/* — finance — */
.fin-hero{background:var(--brown); color:var(--cream); border-radius:26px; padding:22px; box-shadow:var(--shadow-lift); position:relative; overflow:hidden}
html[data-theme="dark"] .fin-hero{background:#3A3020}
.fin-hero .lb{font-size:10px; font-weight:800; letter-spacing:.2em; text-transform:uppercase; opacity:.75}
.fin-hero .v{font-family:var(--serif); font-size:42px; font-weight:500; margin-top:6px; font-variant-numeric:lining-nums; line-height:1}
.fin-hero .row{display:flex; gap:22px; margin-top:16px}
.fin-hero .row .lb{font-size:9.5px}
.fin-hero .row .v2{font-family:var(--serif); font-size:19px; margin-top:3px; font-variant-numeric:lining-nums}
.mbar{display:flex; align-items:flex-end; gap:6px; height:110px; margin-top:6px}
.mbar .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:0}
.mbar .stack{width:100%; max-width:30px; display:flex; flex-direction:column-reverse; gap:2px; border-radius:6px; overflow:hidden}
.mbar .seg{width:100%}
.mbar .ml{font-size:9px; font-weight:800; letter-spacing:.04em; color:var(--ink-3); text-transform:uppercase; white-space:nowrap}
.mbar .mv{font-size:9.5px; font-weight:700; color:var(--ink-2); font-variant-numeric:tabular-nums; white-space:nowrap}
.legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:12px}
.legend span{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:var(--ink-2)}
.legend i{width:9px; height:9px; border-radius:3px; display:inline-block}
.iprog{height:4px; background:var(--sand); border-radius:99px; overflow:hidden; margin-top:7px}
.iprog i{display:block; height:100%; background:var(--sage); border-radius:99px}

/* — settings — */
.set-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-top:1px solid var(--line); width:100%; text-align:left}
.set-row:first-child{border-top:0}
.set-row .k{font-weight:700; font-size:14.5px}
.set-row .d{font-size:12px; color:var(--ink-2); margin-top:2px}
.set-row .v{color:var(--ink-2); font-size:13.5px; font-weight:600; flex:none; display:flex; align-items:center; gap:6px}
.seg-ctl{display:flex; background:var(--sand); border-radius:99px; padding:3px}
.seg-ctl button{padding:7px 14px; border-radius:99px; font-size:12px; font-weight:800; color:var(--ink-2)}
.seg-ctl button.on{background:var(--surface); color:var(--ink); box-shadow:var(--shadow)}

/* — toast — */
#toast{
  position:fixed; left:50%; bottom:calc(var(--nav-h) + 26px + env(safe-area-inset-bottom)); transform:translate(-50%,20px);
  background:var(--ink); color:var(--bg); font-size:13px; font-weight:700; padding:11px 18px;
  border-radius:99px; z-index:80; opacity:0; pointer-events:none; transition:all .25s ease; max-width:86vw; text-align:center;
}
html[data-theme="dark"] #toast{background:var(--cream); color:#14151F}
#toast.in{opacity:1; transform:translate(-50%,0)}

/* — sparkle fx — */
.spark-burst{position:fixed; z-index:90; pointer-events:none; color:var(--terra); font-size:13px}
@keyframes sb{ 0%{transform:translate(0,0) scale(.4); opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(1.15); opacity:0} }
.spark-burst span{position:absolute; animation:sb .65s ease-out forwards}

/* — drag sort — */
.drag-handle{color:var(--ink-3); flex:none; touch-action:none; padding:4px; cursor:grab}
.dragging{opacity:.35}
.drag-ghost{position:fixed; z-index:95; pointer-events:none; box-shadow:var(--shadow-lift); border-radius:var(--r-md); opacity:.96}

/* — misc — */
.empty{padding:38px 20px; text-align:center; color:var(--ink-2)}
.empty .sp{font-size:22px; color:var(--terra)}
.empty .t{font-family:var(--serif); font-size:19px; color:var(--ink); margin-top:8px}
.empty .d{font-size:13px; margin-top:5px; line-height:1.5}
.notice{background:var(--sand); border-radius:var(--r-md); padding:13px 15px; font-size:12.5px; color:var(--ink-2); line-height:1.55; margin-top:12px}
.notice b{color:var(--ink)}
.count-b{font-size:11px; font-weight:800; background:var(--sand); color:var(--ink-2); border-radius:99px; padding:2px 9px}
.hidden{display:none!important}
.fadein{animation:fi .28s ease both}
@keyframes fi{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sync-dot.ok{background:var(--sage)} .sync-dot.err{background:var(--terra)} .sync-dot.off{background:var(--ink-3)}
datalist{display:none}
</style>

function fmtMoney(n, dec = 0){
  if (n == null || isNaN(n)) return '—';

function parseMoney(v){
  if (v == null) return null;
  let s = String(v).trim().replace(/[^\d.,\-]/g, '');
  if (!s) return null;
  if (s.includes('.') && s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
  else if (s.includes(',')) s = s.replace(',', '.');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true; } catch(e){}
  return {
    persistent: ok,
    get k(){ return ok; },
    read(k){ try { return ok ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    write(k, v){ mem[k] = v; try { if (ok) localStorage.setItem(k, v); } catch(e){} },
    del(k){ delete mem[k]; try { if (ok) localStorage.removeItem(k); } catch(e){} }

})();

/* ——— finance ——— */
function finOf(p){
  const price = p.price ?? null;
  if (price == null || !p.instCount || !p.instStart) return { monthly:0, paid:0, remain:0, remCnt:0, active:false };
  const monthly = price / p.instCount;
  const iNow = ymIdx(ymNow()), i0 = ymIdx(p.instStart);
  const paid = clamp(iNow - i0, 0, p.instCount);   /* taksit ay SONUNDA ödenir: içinde bulunulan ay henüz ödenmedi */
  const remCnt = p.instCount - paid;
  return { monthly, paid, remCnt, remain: remCnt * monthly, active: iNow >= i0 && iNow < i0 + p.instCount };
}
function finance(){
  let debt = 0, month = 0, spent = 0, remCnt = 0, spentCnt = 0, unpriced = 0, maxLast = -1;
  const cards = {};
  const upcoming = {}; // ymIdx -> {card: amount}
  const i0 = ymIdx(ymNow());
  for (const p of prodsA()){
    if (p.status !== 'alindi') continue;   /* Evde Var / Hediye finansa girmez */
    spentCnt++;
    if (p.price != null) spent += p.price; else { unpriced++; continue; }
    const f = finOf(p);
    if (!f.monthly) continue;
    debt += f.remain; remCnt += f.remCnt;
    const last = ymIdx(p.instStart) + p.instCount - 1;
    if (f.remCnt > 0 && last > maxLast) maxLast = last;
    if (f.active) month += f.monthly;
    const cardName = p.card || 'Kart belirtilmedi';
    cards[cardName] = (cards[cardName] || 0) + f.remain;
    const s = ymIdx(p.instStart);
    for (let i = Math.max(s, i0); i < s + p.instCount; i++){
      (upcoming[i] ??= {})[cardName] = ((upcoming[i] ??= {})[cardName] || 0) + f.monthly;
    }
  }
  return { remMonths: maxLast >= i0 ? maxLast - i0 + 1 : 0, debt, month, spent, remCnt, spentCnt, unpriced, cards, upcoming };
}

/* ——— insights ——— */
const normName = s => trLow(s).replace(/\([^)]*\)/g,'').replace(/[^a-zçğıöşü0-9 ]/gi,' ').replace(/\s+/g,' ').trim();
function insights(){
  const out = [];
  const ps = prodsA();
  // duplicates
  const groups = {};
  ps.forEach(p => { const k = p.roomId + '|' + normName(p.name); (groups[k] ??= []).push(p); });
  const dups = Object.values(groups).filter(g => g.length > 1);
  if (dups.length) out.push({ type:'dup', t:`${dups.length} olası kopya ürün grubu`, d: dups.slice(0,3).map(g => g[0].name).join(' · '), ids: dups.flat().map(p=>p.id) });
  // high priority unpurchased
  const hi = ps.filter(p => p.priority === 'yuksek' && !isDone(p));
  if (hi.length) out.push({ type:'prio', t:`${hi.length} yüksek öncelikli ürün bekliyor`, d: hi.slice(0,3).map(p=>p.name).join(' · '), ids: hi.map(p=>p.id) });
  // expensive remaining
  const exp = ps.filter(p => !isDone(p) && (p.price ?? p.listPrice) != null)
    .sort((a,b) => (b.price ?? b.listPrice) - (a.price ?? a.listPrice)).slice(0,5);
  if (exp.length) out.push({ type:'exp', t:'En büyük bekleyen harcamalar', d: exp.slice(0,3).map(p => `${p.name} · ${fmtMoney(p.price ?? p.listPrice)}`).join('  ·  '), ids: exp.map(p=>p.id) });
  // stale wishlist
  const staleT = now() - 45*864e5;
  const stale = ps.filter(p => (p.status === 'wishlist' || p.status === 'arastiriliyor') && p.updatedAt < staleT);
  if (stale.length) out.push({ type:'stale', t:`${stale.length} wishlist ürünü 45+ gündür bekliyor`, d: stale.slice(0,3).map(p=>p.name).join(' · '), ids: stale.map(p=>p.id) });
  return out;
}

/* drag-to-sort (pointer based, mobile friendly) */
function makeSortable(container, itemSel, onReorder){
  let drag = null;
  container.addEventListener('pointerdown', e => {
    const h = e.target.closest('.drag-handle'); if (!h) return;
    const item = h.closest(itemSel); if (!item || item.parentElement !== container) return;
    e.preventDefault();
    const rect = item.getBoundingClientRect();
    const ghost = item.cloneNode(true);
    ghost.classList.add('drag-ghost');
    Object.assign(ghost.style, { width: rect.width+'px', left: rect.left+'px', top: rect.top+'px', background:'var(--surface)' });
    document.body.appendChild(ghost);
    item.classList.add('dragging');
    drag = { item, ghost, dy: e.clientY - rect.top };
    h.setPointerCapture(e.pointerId);
    const move = ev => {
      if (!drag) return;
      const y = ev.clientY;
      drag.ghost.style.top = (y - drag.dy) + 'px';
      const sibs = $$(itemSel, container).filter(el => el !== drag.item);
      for (const s of sibs){
        const r = s.getBoundingClientRect();
        if (y > r.top && y < r.bottom){
          const before = y < r.top + r.height / 2;
          container.insertBefore(drag.item, before ? s : s.nextSibling);
          break;
        }
      }
    };
    const up = () => {
      if (!drag) return;
      drag.ghost.remove(); drag.item.classList.remove('dragging');
      const ids = $$(itemSel, container).map(el => el.dataset.id);
      drag = null;
      h.removeEventListener('pointermove', move);
      onReorder(ids);
    };
    h.addEventListener('pointermove', move);
    h.addEventListener('pointerup', up, { once:true });
    h.addEventListener('pointercancel', up, { once:true });
  });
}

  <div class="section-h"><div class="eyebrow">Odalar</div><button class="act" data-go="inv">Tümü ${sparkTxt}</button></div>
  <div class="rooms">${roomsA().map(roomCard).join('')}</div>

  ${ins.length ? `
  <div class="section-h"><div class="eyebrow">Akıllı Notlar</div></div>
  <div class="card" style="padding:5px 16px">${ins.map(insRow).join('')}</div>` : ''}

  ${!S.meta.welcomed ? `
  <div class="notice fadein">${sparkTxt} <b>Excel envanterin içe aktarıldı</b> — ${prodsA().length} ürün, ${catsA().length} kategori, ${roomsA().length} oda. Salon sayfasındaki birebir kopya satırlar (19 adet) tekilleştirildi. Artık her şey burada yaşıyor. <button style="font-weight:800;color:var(--on-indigo)" id="wel-ok">Anladım</button></div>` : ''}
  `;
}
function roomCard(r){
  const ps = roomProds(r.id);
  const done = ps.filter(isDone).length;
  const pct = ps.length ? Math.round(done / ps.length * 100) : 0;
  const lite = lightRoom(r.color);
  const fg = lite ? 'var(--brown)' : 'var(--cream)';
  return `<button class="room-card ${lite ? 'lite' : ''}" data-room="${r.id}" style="background:${r.color};color:${fg}">
    <div class="nm serif">${esc(r.name)}</div>
    <div>
      <div class="room-row-ft"><span class="cnt">${done}/${ps.length} ürün</span><span class="pct serif">${pct}<sup>%</sup></span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
  </button>`;
}
function insRow(i){
  const conf = {
    dup:  { bg:'var(--chip-terra)',  fg:'var(--terra)', ic:'⧉' },
    prio: { bg:'var(--chip-indigo)', fg:'var(--on-indigo)', ic:'!' },
    exp:  { bg:'var(--chip-plum)',   fg:'var(--plum)', ic:'₺' },
    stale:{ bg:'var(--chip-sage)',   fg:'var(--ok)', ic:sparkTxt },
  }[i.type];
  return `<button class="ins" data-ins='${esc(JSON.stringify(i.ids))}' style="width:100%;text-align:left">
    <div class="ic" style="background:${conf.bg};color:${conf.fg};font-weight:800;font-size:14px">${conf.ic}</div>
    <div class="bd"><div class="t">${i.t}</div><div class="d">${esc(i.d)}</div></div>
    <span style="color:var(--ink-3)">${I.right}</span>
  </button>`;
}

/* ——— INVENTORY ——— */
function matchesFilters(p){
  if (F.q){ const q = trLow(F.q); if (!trLow(p.name).includes(q) && !trLow(p.brand).includes(q) && !trLow(p.model).includes(q)) return false; }
  if (F.status.length && !F.status.includes(p.status)) return false;
  if (F.prio.length && !F.prio.includes(p.priority)) return false;
  if (F.tags.length && !F.tags.every(t => p.tags.includes(t))) return false;
  if (F.roomId && p.roomId !== F.roomId) return false;
  return true;
}
const filtersLive = () => F.q || filterCount() > 0;

function invBody(){
  const searching = filtersLive();
  let body;
  if (searching){
    const hits = prodsA().filter(matchesFilters);
    body = hits.length
      ? `<div class="plist fadein">${hits.slice(0, 200).map(p => prodRow(p, { ctx:true })).join('')}</div>
         ${hits.length > 200 ? `<p class="empty" style="padding:14px">İlk 200 sonuç gösteriliyor</p>` : ''}`
      : `<div class="empty"><div class="sp">${sparkTxt}</div><div class="t serif">Sonuç yok</div><div class="d">Aramayı veya filtreleri gevşetmeyi dene.</div></div>`;
    body = `<div style="display:flex;align-items:center;justify-content:space-between;margin:2px 2px 10px">
      <span class="count-b">${hits.length} sonuç</span>
      <button class="act" style="font-size:12.5px;font-weight:800;color:var(--on-indigo)" id="clear-f">Temizle</button></div>` + body;
  } else if (invRoom){
    body = roomDetail(invRoom);
  } else {
    body = `<div class="rooms fadein">${roomsA().map(roomCard).join('')}</div>
      ${sortMode ? `<div class="card" style="margin-top:14px;padding:6px 8px" id="room-sort">${roomsA().map(r =>
        `<div class="frow" data-id="${r.id}" style="padding:10px 8px"><span class="drag-handle">${I.drag}</span><span style="flex:1;font-weight:700">${esc(r.name)}</span>
         <button class="pill" data-edroom="${r.id}" style="padding:5px 11px">${I.pen}</button></div>`).join('')}</div>` : ''}
      <div class="two" style="margin-top:14px">
        <button class="btn ghost sm" style="width:100%;padding:12px" id="add-room">${I.plus} Oda ekle</button>
        <button class="btn ghost sm" style="width:100%;padding:12px" id="sort-rooms">${sortMode ? 'Bitti' : 'Düzenle / Sırala'}</button>
      </div>`;
  }
  return body;
}
function renderInv(){
  return `
  ${pageHead('Oda → Kategori → Ürün', '<em>Envanter</em>')}
  <div class="search">
    ${I.search}
    <input id="q" placeholder="Ürün, marka ara…" value="${esc(F.q)}" autocomplete="off">
    <button class="fbtn" id="open-f" aria-label="Filtreler">${I.filter}${filterCount() ? `<span class="badge">${filterCount()}</span>` : ''}</button>
  </div>
  <div id="inv-body">${invBody()}</div>`;
}

function roomDetail(rid){
  const r = room(rid);
  if (!r) { invRoom = null; return ''; }
  const cats = catsA(rid);
  const ps = roomProds(rid);
  const done = ps.filter(isDone).length;
  const pct = ps.length ? Math.round(done / ps.length * 100) : 0;
  return `
  <div class="fadein">
  <button style="display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--ink-2);margin:2px 0 10px" id="back-rooms">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg> Odalar
  </button>
  <div class="card" style="display:flex;align-items:center;gap:14px;padding:16px">
    <div style="width:44px;height:44px;border-radius:14px;background:${r.color};flex:none;display:grid;place-items:center;color:${lightRoom(r.color) ? 'var(--brown)' : 'var(--cream)'};font-family:var(--serif);font-size:19px">${esc([...r.name][0])}</div>
    <div style="flex:1;min-width:0">
      <div style="font-family:var(--serif);font-size:20px">${esc(r.name)}</div>
      <div style="font-size:12px;color:var(--ink-2);margin-top:1px">${done}/${ps.length} ürün · %${pct}</div>
      <div class="iprog"><i style="width:${pct}%"></i></div>
    </div>
    <button class="pill" data-edroom="${r.id}" style="padding:7px 12px">${I.pen}</button>
  </div>
  <div class="two" style="margin-top:12px">
    <button class="btn ghost sm" style="width:100%;padding:11px" data-addcat="${rid}">${I.plus} Kategori</button>
    <button class="btn ghost sm" style="width:100%;padding:11px" id="sort-toggle">${sortMode ? 'Sıralama bitti' : 'Sırala'}</button>
  </div>
  ${cats.length ? (sortMode
    ? `<div id="cat-sort" style="margin-top:6px">${cats.map(c => catBlock(c, true)).join('')}</div>`
    : cats.map(c => catBlock(c, false)).join(''))
    : `<div class="empty"><div class="sp">${sparkTxt}</div><div class="t serif">Henüz kategori yok</div><div class="d">İlk kategoriyi ekleyerek başla.</div></div>`}
  </div>`;
}
function catBlock(c, sortable){
  const ps = catProds(c.id);
  const done = ps.filter(isDone).length;
  return `<div data-id="${c.id}" class="catblock">
    <div class="cat-h">
      <div style="display:flex;align-items:center;gap:8px">
        ${sortable ? `<span class="drag-handle">${I.drag}</span>` : ''}
        <span class="t">${esc(c.name)}</span>
        <button data-edcat="${c.id}" style="color:var(--ink-3)">${I.pen}</button>
      </div>
      <span class="n">${done}/${ps.length}</span>
    </div>
    ${ps.length ? `<div class="plist" ${sortable ? `data-psort="${c.id}"` : ''}>${ps.map(p => prodRow(p, { sortable })).join('')}</div>`
    : `<div class="plist"><div style="padding:13px 16px;font-size:13px;color:var(--ink-3)">Bu kategoride ürün yok</div></div>`}
  </div>`;
}
function prodRow(p, { ctx = false, sortable = false } = {}){
  const done = isDone(p);
  const price = p.price ?? p.listPrice;
  const meta = [];
  if (ctx) meta.push(`${esc(room(p.roomId)?.name || '')} ${sparkTxt} ${esc(cat(p.catId)?.name || '')}`);
  if (p.brand) meta.push(esc(p.brand));
  if (p.tags.length) meta.push(p.tags.slice(0,2).map(esc).join(', '));
  return `<button class="prow" data-prod="${p.id}" data-idsort="${p.id}" data-id="${p.id}">
    ${sortable ? `<span class="drag-handle">${I.drag}</span>` : `<span class="tick ${done ? 'on' : ''}" data-tick="${p.id}">${I.tick}</span>`}
    <span class="bd">
      <span class="nm ${done ? 'done' : ''}" style="display:block">${p.priority ? `<span class="prio-dot prio-${p.priority}" style="margin-right:6px;vertical-align:2px"></span>` : ''}${esc(p.name)}</span>
      <span class="mt">${`<span class="chip st-${p.status}" style="padding:2px 8px">${stLabel(p.status)}</span>`}${meta.length ? `<span style="overflow:hidden;text-overflow:ellipsis">${meta.join(' · ')}</span>` : ''}</span>
    </span>
    ${price != null ? `<span class="pr">${fmtMoney(price)}</span>` : ''}
    ${p.alts?.some(a => a.st === 'a') ? `<span style="color:var(--plum);font-size:12px">${sparkTxt}</span>` : ''}
  </button>`;
}
</script>
<script>
/* ——— WISHLIST ——— */
function renderWish(){
  const items = prodsA().filter(p => p.status === 'wishlist' || p.alts.length);
  return `
  ${pageHead('Karşılaştır, seç, arşivle', '<em>Wishlist</em>')}
  ${items.length ? items.map(wishCard).join('') : `
    <div class="empty" style="margin-top:30px"><div class="sp">${sparkTxt}</div>
    <div class="t serif">Wishlist boş</div>
    <div class="d">Bir ürünün durumunu <b>Wishlist</b> yap veya ürün detayından alternatif ekle;<br>karşılaştırma burada yaşar.</div></div>`}`;
}
function wishCard(p){
  const acts = p.alts.filter(a => a.st !== 'x');
  const arch = p.alts.filter(a => a.st === 'x');
  const prices = acts.map(a => a.price).filter(n => n != null);
  const min = prices.length ? Math.min(...prices) : null;
  return `<div class="card fadein" style="margin-top:14px;padding:16px 16px 12px">
    <button data-prod="${p.id}" style="display:flex;align-items:center;gap:10px;width:100%;text-align:left">
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:15.5px">${esc(p.name)}</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:1px">${esc(room(p.roomId)?.name || '')} · ${esc(cat(p.catId)?.name || '')}</div>
      </div>
      <span class="chip st-${p.status}">${stLabel(p.status)}</span>
    </button>
    <div style="margin-top:6px">
    ${acts.length ? acts.map(a => altRow(p, a, min)).join('') : `<div style="font-size:12.5px;color:var(--ink-3);padding:10px 0">Henüz alternatif yok</div>`}
    </div>
    ${arch.length ? `<details><summary style="font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--ink-3);padding:8px 0;cursor:pointer;list-style:none">ARŞİV · ${arch.length}</summary>${arch.map(a => altRow(p, a, null)).join('')}</details>` : ''}
    <button class="btn ghost sm" style="margin-top:8px" data-addalt="${p.id}">${I.plus} Alternatif ekle</button>
  </div>`;
}
function altRow(p, a, min){
  const won = a.st === 's', archd = a.st === 'x';
  const best = min != null && a.price === min && !won;
  return `<div class="alt ${won ? 'won' : ''} ${archd ? 'arch' : ''}">
    <div class="bd" data-altedit='${p.id}|${a.id}' style="cursor:pointer">
      <div class="nm">${esc(a.name)}${a.url ? ` <a href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--on-indigo);vertical-align:-2px">${I.link}</a>` : ''}</div>
      <div class="mt">${[a.price != null ? fmtMoney(a.price) + (best ? ' · en uygun' : '') : null, a.note ? esc(a.note) : null].filter(Boolean).join(' · ') || '&nbsp;'}</div>
    </div>
    ${won ? `<span class="pk done">Seçildi</span>`
      : archd ? `<button class="pk" data-altback='${p.id}|${a.id}'>Geri al</button>`
      : `<button class="pk" data-altpick='${p.id}|${a.id}'>Bunu seç</button>`}
    ${!won ? `<button style="color:var(--ink-3)" data-altdel='${p.id}|${a.id}'>${I.x}</button>` : ''}
  </div>`;
}

/* ——— FINANCE ——— */
function renderFin(){
  const f = finance();
  const i0 = ymIdx(ymNow());
  const months = Array.from({length:12}, (_,k) => i0 + k);
  const cardNames = Object.keys(f.cards);
  const cardColors = ['var(--indigo)','var(--terra)','var(--plum)','var(--sage)','var(--ochre)','var(--brown)'];
  const cc = n => cardColors[cardNames.indexOf(n) % cardColors.length];
  const maxM = Math.max(1, ...months.map(i => Object.values(f.upcoming[i] || {}).reduce((a,b)=>a+b,0)));
  const instP = prodsA().filter(p => p.status === 'alindi' && p.instCount && p.price != null && p.instStart);

  return `
  ${pageHead('Otomatik hesap · elle sıfır', '<em>Finans</em>')}
  <div class="fin-hero fadein" style="margin-top:16px">
    <span style="position:absolute;top:16px;right:18px;opacity:.6">${sparkTxt}</span>
    <div class="lb">Güncel Kart Borcu</div>
    <div class="v">${fmtMoney(f.debt)}</div>
    <div class="row">
      <div><div class="lb">Bu ay</div><div class="v2">${fmtMoney(f.month)}</div></div>
      <div><div class="lb">Kalan taksit</div><div class="v2">${f.remMonths ? f.remMonths + ' ay' : '—'}</div></div>
      <div><div class="lb">Toplam harcanan</div><div class="v2">${fmtMoney(f.spent)}</div></div>
    </div>
  </div>

  <div class="section-h"><div class="eyebrow">Önümüzdeki 12 Ay</div></div>
  <div class="card">
    ${f.remCnt ? `
    <div class="mbar">
      ${months.map((i,k) => { const seg = f.upcoming[i] || {}; const tot = Object.values(seg).reduce((a,b)=>a+b,0);
        const ym = idxYm(i);
        const mNum = String(+ym.slice(5));
        const lab = k % 2 ? '' : (k === 0 || ym.endsWith('-01') ? mNum + "'" + ym.slice(2,4) : mNum);
        return `<div class="col">
          <span class="mv">${tot ? Math.round(tot/1000) + 'k' : ''}</span>
          <div class="stack" style="height:${Math.max(3, tot/maxM*78)}px">${Object.entries(seg).map(([c,v]) =>
            `<i class="seg" style="height:${v/Math.max(tot,1)*100}%;background:${cc(c)}"></i>`).join('')}</div>
          <span class="ml">${lab}</span></div>`; }).join('')}
    </div>
    <div class="legend">${cardNames.map(c => `<span><i style="background:${cc(c)}"></i>${esc(c)} · ${fmtMoney(f.cards[c])}</span>`).join('')}</div>`
    : `<div class="empty" style="padding:22px"><div class="sp">${sparkTxt}</div><div class="d">Aktif taksit yok. Satın alınan bir ürüne fiyat + taksit girdiğinde<br>aylık yük burada otomatik belirir.</div></div>`}
  </div>

  ${instP.length ? `
  <div class="section-h"><div class="eyebrow">Taksitli Ürünler</div><span class="count-b">${instP.length}</span></div>
  <div class="plist">
    ${instP.map(p => { const fo = finOf(p); return `
    <button class="prow" data-prod="${p.id}">
      <span class="bd">
        <span class="nm">${esc(p.name)}</span>
        <span class="mt">${esc(p.card || 'Kart yok')} · ${fo.paid}/${p.instCount} taksit · ay ${fmtMoney(fo.monthly)}</span>
        <span class="iprog" style="margin-top:6px"><i style="width:${fo.paid/p.instCount*100}%"></i></span>
      </span>
      <span class="pr">${fmtMoney(fo.remain)}<br><small style="font-family:var(--sans);font-size:10px;color:var(--ink-3)">kalan</small></span>
    </button>`; }).join('')}
  </div>` : ''}

  ${f.unpriced ? `<div class="notice">${f.unpriced} satın alınmış ürünün fiyatı girilmemiş — toplam harcanana dahil değiller.</div>` : ''}`;
}

/* ——— SETTINGS ——— */
function renderSet(){
  const themes = [['system','Oto'],['light','Açık'],['dark','Koyu']];
  const syncOn = !!S.settings.clientId && Sync.enabled();
  const dot = Sync.status === 'ok' ? 'ok' : (Sync.status === 'error' || Sync.status === 'noauth') ? 'err' : 'off';
  const stTxt = { off:'Kapalı', ok:'Bağlı', syncing:'Eşitleniyor…', error:'Hata', noauth:'Yeniden bağlan' }[Sync.status] || 'Kapalı';
  return `
  ${pageHead('Kişiselleştir', '<em>Ayarlar</em>')}
  <div class="section-h"><div class="eyebrow">Hedef</div></div>
  <div class="card" style="padding:5px 0">
    <button class="set-row" id="ed-count"><span><span class="k">Geri sayım</span><div class="d">${esc(S.settings.title)} · ${fmtDateTR(S.settings.date)}</div></span><span class="v">${I.right}</span></button>
  </div>

  <div class="section-h"><div class="eyebrow">Görünüm</div></div>
  <div class="card" style="padding:5px 0">
    <div class="set-row"><span class="k">Tema</span>
      <div class="seg-ctl">${themes.map(([id,l]) => `<button data-theme-set="${id}" class="${S.settings.theme === id ? 'on' : ''}">${l}</button>`).join('')}</div>
    </div>
    <div class="set-row"><span class="k">Para birimi</span>
      <div class="seg-ctl">${['₺','€','$'].map(c => `<button data-cur="${c}" class="${S.settings.currency === c ? 'on' : ''}">${c}</button>`).join('')}</div>
    </div>
  </div>

  <div class="section-h"><div class="eyebrow">Eşitleme</div></div>
  <div class="card" style="padding:5px 0">
    <div class="set-row"><span><span class="k">Google Drive</span><div class="d">Veriler kendi Drive'ında, uygulamaya özel gizli klasörde saklanır.</div></span>
      <span class="v"><span class="sync-dot ${dot}"></span>${stTxt}</span></div>
    <div style="padding:4px 16px 14px">
      <input class="inp" id="cid" placeholder="Google OAuth Client ID (…apps.googleusercontent.com)" value="${esc(S.settings.clientId)}" autocomplete="off" style="font-size:12.5px">
      <div class="two">
        <button class="btn sm ghost" style="width:100%" id="sync-save">Kaydet</button>
        ${syncOn ? `<button class="btn sm ghost" style="width:100%" id="sync-off">Bağlantıyı kes</button>`
                  : `<button class="btn sm" style="width:100%;background:var(--indigo);color:var(--cream)" id="sync-on">${I.cloud} Bağlan</button>`}
      </div>
      ${Sync.lastAt ? `<div style="font-size:11px;color:var(--ink-3);margin-top:8px">Son eşitleme: ${new Date(Sync.lastAt).toLocaleString('tr-TR')}</div>` : ''}
      <div style="font-size:11px;color:var(--ink-3);margin-top:6px">Kurulum adımları README dosyasında.</div>
    </div>
  </div>

  <div class="section-h"><div class="eyebrow">Gelişmiş</div></div>
  <div class="card" style="padding:5px 0">
    <button class="set-row" id="exp-json"><span class="k">Verileri dışa aktar</span><span class="v">JSON</span></button>
    <button class="set-row" id="imp-json"><span class="k">Yedekten geri yükle</span><span class="v">JSON</span></button>
    <button class="set-row" id="reset-all"><span class="k" style="color:var(--terra)">Tüm verileri sıfırla</span><span class="v"></span></button>
    <input type="file" id="imp-file" accept="application/json" class="hidden">
  </div>
  <p style="text-align:center;font-size:11px;color:var(--ink-3);margin-top:22px">Gelecek Envanteri ${sparkTxt} v${VERSION}${store.persistent ? '' : ' · <b style="color:var(--terra)">geçici depolama modu</b>'}</p>`;
}
</script>
<script>
/* ═══════════════════ SHEETS ═══════════════════ */

/* — product detail — */
function productSheet(pid){
  const p = prod(pid); if (!p) return;
  const f = () => finOf(p);
  const rec = openSheet(`
    ${sheetHead(esc(p.name), `${esc(room(p.roomId)?.name || '')} · ${esc(cat(p.catId)?.name || '')}`)}
    <div class="sh-b" id="ps">
      <details class="sect" open>
        <summary>Genel ${I.chev}</summary>
        <div class="in">
          <div class="frow"><span class="k">Ürün adı</span><span class="v"><input data-f="name" value="${esc(p.name)}"></span></div>
          <div class="frow"><span class="k">Konum</span><span class="v"><button data-move="${p.id}" style="color:var(--on-indigo);font-weight:700">${esc(room(p.roomId)?.name)} · ${esc(cat(p.catId)?.name)} ${I.right}</button></span></div>
          <div class="frow" style="display:block"><span class="k" style="display:block;margin-bottom:8px">Durum</span><div class="pill-row" id="ps-st">${statusChips(p.status)}</div></div>
          <div class="frow" style="display:block"><span class="k" style="display:block;margin-bottom:8px">Öncelik</span><div class="pill-row" id="ps-pr">${prioChips(p.priority)}</div></div>
          <div class="frow" style="display:block"><span class="k" style="display:block;margin-bottom:8px">Etiketler</span><div class="pill-row" id="ps-tg"></div></div>
          <div class="frow"><span class="k">Marka</span><span class="v"><input data-f="brand" value="${esc(p.brand)}" placeholder="Ekle"></span></div>
          <div class="frow"><span class="k">Model</span><span class="v"><input data-f="model" value="${esc(p.model)}" placeholder="Ekle"></span></div>
        </div>
      </details>

      <details class="sect" id="ps-sec-fin" ${p.price != null || p.instCount ? 'open' : ''}>
        <summary>Finans ${I.chev}</summary>
        <div class="in">
          <div class="frow"><span class="k">Liste fiyatı</span><span class="v"><input data-money="listPrice" inputmode="decimal" value="${p.listPrice ?? ''}" placeholder="—"></span></div>
          <div class="frow"><span class="k">Alış fiyatı</span><span class="v"><input data-money="price" inputmode="decimal" value="${p.price ?? ''}" placeholder="—"></span></div>
          <div class="frow"><span class="k">Kredi kartı</span><span class="v"><input data-f="card" value="${esc(p.card)}" placeholder="Ekle" list="cards-dl"></span></div>
          <div class="frow"><span class="k">Taksit sayısı</span><span class="v"><input data-int="instCount" inputmode="numeric" value="${p.instCount ?? ''}" placeholder="—"></span></div>
          <div class="frow"><span class="k">Taksit başlangıcı</span><span class="v" style="display:flex;gap:6px;justify-content:flex-end">
            <select data-instm style="font:inherit;font-weight:600;color:inherit;background:none;text-align:right"><option value="">— Ay</option>${['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'].map((m,i)=>{const v=String(i+1).padStart(2,'0');return `<option value="${v}" ${p.instStart?.slice(5)===v?'selected':''}>${m}</option>`;}).join('')}</select>
            <select data-insty style="font:inherit;font-weight:600;color:inherit;background:none"><option value="">Yıl</option>${Array.from({length:9},(_,i)=>2024+i).map(y=>`<option ${p.instStart?.slice(0,4)==String(y)?'selected':''}>${y}</option>`).join('')}</select>
          </span></div>
          <div class="frow" id="ps-fin"><span class="k">Hesap</span><span class="v ghosty" id="ps-fin-v"></span></div>
        </div>
      </details>

      <details class="sect" id="ps-sec-wish" ${p.alts.length ? 'open' : ''}>
        <summary>Wishlist · Alternatifler ${I.chev}</summary>
        <div class="in" id="ps-alts"></div>
      </details>

      <details class="sect" ${p.notes ? 'open' : ''}>
        <summary>Notlar ${I.chev}</summary>
        <div class="in"><textarea class="inp" data-f="notes" placeholder="Kendine not…" style="border:0;padding:4px 0;background:none">${esc(p.notes)}</textarea></div>
      </details>

      <details class="sect" ${p.links.length ? 'open' : ''}>
        <summary>Alışveriş Bağlantıları ${I.chev}</summary>
        <div class="in" id="ps-links"></div>
      </details>

      <button class="btn danger" data-delprod="${p.id}">${I.trash} Ürünü sil</button>
      <datalist id="cards-dl">${usedCards().map(c => `<option value="${esc(c)}">`).join('')}</datalist>
    </div>`);

  const sh = rec.sh;
  const refreshSects = () => {
    const off = p.status === 'evde' || p.status === 'hediye';
    $('#ps-sec-fin', sh).classList.toggle('hidden', off);
    $('#ps-sec-wish', sh).classList.toggle('hidden', off);
  };
  const refreshFin = () => {
    const x = f();
    $('#ps-fin-v', sh).textContent = x.monthly
      ? `ayda ${fmtMoney(x.monthly)} · ${x.paid}/${p.instCount} ödendi · kalan ${fmtMoney(x.remain)}`
      : 'fiyat + taksit + başlangıç gir';
  };
  const refreshTags = () => {
    $('#ps-tg', sh).innerHTML = p.tags.map(t =>
      `<span class="pill on" style="gap:7px">${esc(t)}<button data-rmtag="${esc(t)}" style="color:inherit;opacity:.7">${I.x}</button></span>`).join('')
      + `<button class="pill" id="ps-addtag">${I.plus} Etiket</button>`;
  };
  const refreshAlts = () => {
    const acts = p.alts.filter(a => a.st !== 'x'), arch = p.alts.filter(a => a.st === 'x');
    const prices = acts.map(a => a.price).filter(n => n != null);
    const min = prices.length ? Math.min(...prices) : null;
    $('#ps-alts', sh).innerHTML =
      (p.alts.length ? acts.map(a => altRow(p, a, min)).join('') + arch.map(a => altRow(p, a, null)).join('') : `<div style="font-size:12.5px;color:var(--ink-3);padding:8px 0">Alternatif ekle, fiyatları yan yana gör.</div>`)
      + `<button class="btn ghost sm" style="margin-top:10px" data-addalt="${p.id}">${I.plus} Alternatif ekle</button>`;
  };
  const refreshLinks = () => {
    $('#ps-links', sh).innerHTML =
      p.links.map(l => `<div class="linkrow">
        <span style="color:var(--on-indigo)">${I.link}</span>
        <a class="u" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label || l.url.replace(/^https?:\/\/(www\.)?/,'').split('/')[0])}</a>
        <button class="x" data-rmlink="${l.id}">${I.x}</button></div>`).join('')
      + `<button class="btn ghost sm" style="margin-top:10px" id="ps-addlink">${I.plus} Bağlantı ekle</button>`;
  };
  refreshFin(); refreshTags(); refreshAlts(); refreshLinks(); refreshSects();

  sh.addEventListener('change', e => {
    const t = e.target;
    if (t.dataset.f !== undefined){
      const k = t.dataset.f, v = t.value.trim();
      if (k === 'name' && !v){ t.value = p.name; return; }
      p[k] = k === 'instStart' ? (v || null) : v;
      touch(p); save({ silent:true }); refreshFin();
      if (k === 'name') $('.sh-t', sh).textContent = p.name;
      render();
    }
    if (t.dataset.money !== undefined){ p[t.dataset.money] = parseMoney(t.value); touch(p); save({silent:true}); refreshFin(); render(); }
    if (t.dataset.int !== undefined){ const n = parseInt(t.value, 10); p[t.dataset.int] = isNaN(n) || n <= 0 ? null : n; touch(p); save({silent:true}); refreshFin(); render(); }
    if (t.dataset.instm !== undefined || t.dataset.insty !== undefined){
      const m = $('[data-instm]', sh).value, y = $('[data-insty]', sh).value;
      p.instStart = m && y ? `${y}-${m}` : null;
      touch(p); save({silent:true}); refreshFin(); render();
    }
  });
  sh.addEventListener('click', e => {
    const st = e.target.closest('[data-st]');
    if (st){ setStatus(p, st.dataset.st, e); $('#ps-st', sh).innerHTML = statusChips(p.status); refreshSects(); return; }
    const pr = e.target.closest('[data-prio]');
    if (pr){ p.priority = pr.dataset.prio || null; touch(p); save({silent:true}); $('#ps-pr', sh).innerHTML = prioChips(p.priority); render(); return; }
    const rt = e.target.closest('[data-rmtag]');
    if (rt){ p.tags = p.tags.filter(x => x !== rt.dataset.rmtag); touch(p); save({silent:true}); refreshTags(); render(); return; }
    if (e.target.closest('#ps-addtag')){ tagPickSheet(p, refreshTags); return; }
    if (e.target.closest('#ps-addlink')){ linkSheet(p, refreshLinks); return; }
    const rl = e.target.closest('[data-rmlink]');
    if (rl){ p.links = p.links.filter(l => l.id !== rl.dataset.rmlink); touch(p); save({silent:true}); refreshLinks(); return; }
    const mv = e.target.closest('[data-move]');
    if (mv){ moveSheet(p, () => { closeSheet(rec); productSheet(p.id); }); return; }
    const dp = e.target.closest('[data-delprod]');
    if (dp){ confirmSheet({ title:'Ürünü sil', body:`<b>${esc(p.name)}</b> envanterden kaldırılacak.`, okLabel:'Sil', danger:true }, () => { p.deleted = now(); touch(p); save(); closeSheet(rec); toast('Ürün silindi'); }); return; }
    /* alt actions inside sheet */
    if (handleAltClick(e, () => { refreshAlts(); })) return;
  });
}

function setStatus(p, st, e){
  if (st === p.status) return;
  const willDone = DONE_ST.includes(st);
  if (willDone && !isDone(p)){
    p.prevStatus = p.status;
    if (e) sparkle(e.clientX || innerWidth/2, e.clientY || innerHeight/2);
    toast(({ alindi:'Satın alındı ', evde:'Evde var ', hediye:'Hediye ' })[st] + sparkTxt);
  }
  p.purchasedAt = st === 'alindi' ? now() : null;
  p.status = st; touch(p); save({ silent:true }); render();
}

/* — tag picker — */
function tagPickSheet(p, done){
  const all = usedTags().filter(t => !p.tags.includes(t));
  const rec = openSheet(`
    ${sheetHead('Etiket ekle')}
    <div class="sh-b">
      <div class="fld"><label>Yeni etiket</label>
        <div style="display:flex;gap:8px"><input class="inp" id="tg-new" placeholder="ör. Japandi, IKEA, İndirim Bekleniyor" style="flex:1">
        <button class="btn sm" style="background:var(--indigo);color:var(--cream);border-radius:var(--r-sm);padding:0 16px" id="tg-add">Ekle</button></div></div>
      ${all.length ? `<div class="fld"><label>Mevcut</label><div class="pill-row">${all.map(t => `<button class="pill" data-tgpick="${esc(t)}">${esc(t)}</button>`).join('')}</div></div>` : ''}
    </div>`);
  const add = name => {
    name = name.trim(); if (!name) return;
    if (!p.tags.includes(name)) p.tags.push(name);
    if (!S.tagBank.find(t => trLow(t.name) === trLow(name))) S.tagBank.push({ id:uid(), name, updatedAt:now() });
    touch(p); save({silent:true}); render(); closeSheet(rec); done();
  };
  $('#tg-add', rec.sh).addEventListener('click', () => add($('#tg-new', rec.sh).value));
  $('#tg-new', rec.sh).addEventListener('keydown', e => { if (e.key === 'Enter') add(e.target.value); });
  rec.sh.addEventListener('click', e => { const t = e.target.closest('[data-tgpick]'); if (t) add(t.dataset.tgpick); });
}

/* — link editor — */
function linkSheet(p, done){

    </div>`);

/* — alternative editor + actions — */
function altSheet(p, alt, done){
  const isNew = !alt;
  alt = alt || { id:uid(), name:'', price:null, url:'', note:'', st:'a' };
  const rec = openSheet(`
    ${sheetHead(isNew ? 'Alternatif ekle' : 'Alternatifi düzenle', esc(p.name))}
    <div class="sh-b">
      <div class="fld"><label>İsim / Marka</label><input class="inp" id="al-nm" value="${esc(alt.name)}" placeholder="ör. Philips Airfryer XL"></div>
      <div class="fld"><label>Fiyat</label><input class="inp" id="al-pr" inputmode="decimal" value="${alt.price ?? ''}" placeholder="—"></div>
      <div class="fld"><label>Bağlantı</label><input class="inp" id="al-ur" inputmode="url" value="${esc(alt.url)}" placeholder="https://…"></div>
      <div class="fld"><label>Not</label><input class="inp" id="al-nt" value="${esc(alt.note)}" placeholder="artı / eksi"></div>
      <button class="btn" id="al-ok">${isNew ? 'Ekle' : 'Kaydet'}</button>
    </div>`);
  $('#al-ok', rec.sh).addEventListener('click', () => {
    const nm = $('#al-nm', rec.sh).value.trim(); if (!nm) return;
    alt.name = nm;
    alt.price = parseMoney($('#al-pr', rec.sh).value);
    let u = $('#al-ur', rec.sh).value.trim(); alt.url = u && !/^https?:\/\//i.test(u) ? 'https://' + u : u;
    alt.note = $('#al-nt', rec.sh).value.trim();
    if (isNew){ p.alts.push(alt); if (p.status === 'ihtiyac') p.status = 'arastiriliyor'; }
    touch(p); save(); closeSheet(rec); done?.();
  });
}
function handleAltClick(e, after = () => {}){
  const pick = e.target.closest('[data-altpick]');
  if (pick){
    const [pid, aid] = pick.dataset.altpick.split('|');
    const p = prod(pid), a = p.alts.find(x => x.id === aid);
    confirmSheet({ title:'Bunu seç ' + sparkTxt, body:`<b>${esc(a.name)}</b> seçilecek; diğer alternatifler arşive kalkacak. Marka ve fiyat ürüne yazılır.`, okLabel:'Seç' }, () => {
      p.alts.forEach(x => x.st = x.id === aid ? 's' : 'x');
      if (!p.brand) p.brand = a.name;
      if (a.price != null && p.price == null) p.price = a.price;
      if (a.url && !p.links.find(l => l.url === a.url)) p.links.push({ id:uid(), url:a.url, label:a.name });
      if (p.status === 'wishlist' || p.status === 'arastiriliyor') p.status = 'alinacak';
      touch(p); save(); after(); sparkle(e.clientX, e.clientY); toast('Seçildi — diğerleri arşivde');
    });
    return true;
  }
  const back = e.target.closest('[data-altback]');
  if (back){ const [pid, aid] = back.dataset.altback.split('|'); const p = prod(pid); p.alts.find(x => x.id === aid).st = 'a'; touch(p); save(); after(); return true; }
  const del = e.target.closest('[data-altdel]');
  if (del){ const [pid, aid] = del.dataset.altdel.split('|'); const p = prod(pid); p.alts = p.alts.filter(x => x.id !== aid); touch(p); save(); after(); return true; }
  const add = e.target.closest('[data-addalt]');
  if (add){ altSheet(prod(add.dataset.addalt), null, after); return true; }
  const ed = e.target.closest('[data-altedit]');
  if (ed){ const [pid, aid] = ed.dataset.altedit.split('|'); const p = prod(pid); altSheet(p, p.alts.find(x => x.id === aid), after); return true; }
  return false;
}

/* — quick add — */
function quickAdd(){
  let rid = invRoom || roomsA()[0]?.id, cid = null;
  const rec = openSheet(`
    ${sheetHead('Hızlı ekle', '3 alan yeter — gerisi sonra')}
    <div class="sh-b">
      <div class="fld"><label>Ürün adı</label><input class="inp" id="qa-nm" placeholder="ör. Kahve makinesi" autocomplete="off"></div>
      <div class="fld"><label>Oda</label><div class="pill-row" id="qa-rooms"></div></div>
      <div class="fld"><label>Kategori</label><div class="pill-row" id="qa-cats"></div></div>
      <div class="fld hidden" id="qa-newcat-w"><label>Yeni kategori adı</label><input class="inp" id="qa-newcat" placeholder="ör. Küçük Elektrikli"></div>
      <div class="two"><button class="btn ghost" id="qa-more">Kaydet + Detay</button><button class="btn" id="qa-ok">Kaydet</button></div>
    </div>`);
  const sh = rec.sh;
  const paintRooms = () => { $('#qa-rooms', sh).innerHTML = roomsA().map(r => `<button class="pill ${r.id === rid ? 'on' : ''}" data-r="${r.id}">${esc(r.name)}</button>`).join(''); };
  const paintCats = () => {
    const cs = catsA(rid);
    if (!cid || !cs.find(c => c.id === cid)) cid = cs[0]?.id || null;
    $('#qa-cats', sh).innerHTML = cs.map(c => `<button class="pill ${c.id === cid ? 'on' : ''}" data-c="${c.id}">${esc(c.name)}</button>`).join('')
      + `<button class="pill ${cid === '__new' ? 'on' : ''}" data-c="__new">${I.plus} Yeni</button>`;
    $('#qa-newcat-w', sh).classList.toggle('hidden', cid !== '__new');
  };
  paintRooms(); paintCats();
  setTimeout(() => $('#qa-nm', sh).focus(), 350);
  sh.addEventListener('click', e => {
    const r = e.target.closest('[data-r]'); if (r){ rid = r.dataset.r; cid = null; paintRooms(); paintCats(); return; }
    const c = e.target.closest('[data-c]'); if (c){ cid = c.dataset.c; paintCats(); return; }
  });
  const doSave = openAfter => {
    const nm = $('#qa-nm', sh).value.trim();
    if (!nm){ $('#qa-nm', sh).focus(); return; }
    let catId = cid;
    if (cid === '__new'){
      const cn = $('#qa-newcat', sh).value.trim(); if (!cn){ $('#qa-newcat', sh).focus(); return; }
      const c = { id:uid(), roomId:rid, name:cn, order:catsA(rid).length, updatedAt:now() };
      S.cats.push(c); catId = c.id;
    }
    if (!catId){ toast('Önce bir kategori ekle'); return; }
    const t = now();
    const p = { id:uid(), name:nm, roomId:rid, catId, status:'ihtiyac', priority:null, tags:[], links:[], alts:[],
      brand:'', model:'', notes:'', listPrice:null, price:null, card:'', instCount:null, instStart:null,
      order:catProds(catId).length, createdAt:t, updatedAt:t };
    S.products.push(p); save(); closeSheet(rec);
    toast('Eklendi ' + sparkTxt);
    if (openAfter) productSheet(p.id);
  };
  $('#qa-ok', sh).addEventListener('click', () => doSave(false));
  $('#qa-more', sh).addEventListener('click', () => doSave(true));
  $('#qa-nm', sh).addEventListener('keydown', e => { if (e.key === 'Enter') doSave(false); });
}

/* — filters — */
function filterSheet(){
  const rec = openSheet(`
    ${sheetHead('Filtreler')}
    <div class="sh-b">
      <div class="fld"><label>Durum</label><div class="pill-row" id="ft-st"></div></div>
      <div class="fld"><label>Öncelik</label><div class="pill-row" id="ft-pr"></div></div>
      <div class="fld"><label>Oda</label><div class="pill-row" id="ft-rm"></div></div>
      <div class="fld"><label>Etiket</label><div class="pill-row" id="ft-tg"></div></div>
      <div class="two"><button class="btn ghost" id="ft-clear">Temizle</button><button class="btn" data-close>Uygula</button></div>
    </div>`);
  const sh = rec.sh;
  const paint = () => {
    $('#ft-st', sh).innerHTML = STATUSES.map(s => `<button class="pill ${F.status.includes(s.id) ? 'on' : ''}" data-fst="${s.id}">${s.label}</button>`).join('');
    $('#ft-pr', sh).innerHTML = PRIOS.map(p => `<button class="pill ${F.prio.includes(p.id) ? 'on' : ''}" data-fpr="${p.id}"><span class="prio-dot prio-${p.id}"></span>${p.label}</button>`).join('');
    $('#ft-rm', sh).innerHTML = roomsA().map(r => `<button class="pill ${F.roomId === r.id ? 'on' : ''}" data-frm="${r.id}">${esc(r.name)}</button>`).join('');
    const tags = usedTags();
    $('#ft-tg', sh).innerHTML = tags.length ? tags.map(t => `<button class="pill ${F.tags.includes(t) ? 'on' : ''}" data-ftg="${esc(t)}">${esc(t)}</button>`).join('') : `<span style="font-size:12.5px;color:var(--ink-3)">Henüz etiket yok</span>`;
  };
  paint();
  const tgl = (arr, v) => { const i = arr.indexOf(v); i >= 0 ? arr.splice(i, 1) : arr.push(v); };
  sh.addEventListener('click', e => {
    const st = e.target.closest('[data-fst]'); if (st){ tgl(F.status, st.dataset.fst); paint(); render(); return; }
    const pr = e.target.closest('[data-fpr]'); if (pr){ tgl(F.prio, pr.dataset.fpr); paint(); render(); return; }
    const rm = e.target.closest('[data-frm]'); if (rm){ F.roomId = F.roomId === rm.dataset.frm ? null : rm.dataset.frm; paint(); render(); return; }
    const tg = e.target.closest('[data-ftg]'); if (tg){ tgl(F.tags, tg.dataset.ftg); paint(); render(); return; }
    if (e.target.closest('#ft-clear')){ F.status = []; F.prio = []; F.tags = []; F.roomId = null; paint(); render(); }
  });
  rec.onClose = () => { if (TAB === 'inv') render(); };
}

function roomSheet(rid){
