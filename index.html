    <div class="stat"><div class="lb">Tamamlanma</div><div class="v serif">%${pct}</div><div class="sub">tüm envanter</div></div>
    <div class="stat"><div class="lb">Güncel Borç</div><div class="v serif" style="font-size:21px">${fmtMoney(fin.debt)}</div><div class="sub">${fin.remMonths ? fin.remMonths + ' ay taksit kaldı' : 'aktif taksit yok'}</div></div>
    <div class="stat"><div class="lb">Bu Ay Taksit</div><div class="v serif" style="font-size:21px">${fmtMoney(fin.month)}</div><div class="sub">${ymLabel(ymNow())} ödemesi</div></div>
    <div class="stat"><div class="lb">Cepten Çıkan</div><div class="v serif" style="font-size:21px">${fmtMoney(fin.pocket)}</div><div class="sub">${fin.pocketCnt} satın alım</div></div>
    <div class="stat"><div class="lb">Tasarruf</div><div class="v serif" style="font-size:21px">${fin.savedPct == null ? '—' : '%' + Math.round(fin.savedPct * 100)}</div><div class="sub">${fin.savedPct == null ? 'piyasa fiyatı girilmemiş' : fmtMoney(fin.saved) + ' cepte kaldı'}</div></div>
  </div>

  ${pulseCard()}
  <div class="section-h"><div class="eyebrow">Odalar</div><button class="act" data-go="inv">Tümü ${sparkTxt}</button></div>
  <div class="rooms">${roomsA().map(roomCard).join('')}</div>

  ${ins.length ? `
  <div class="section-h"><div class="eyebrow">Akıllı Notlar</div></div>
  <div class="card" style="padding:5px 16px">${ins.map(insRow).join('')}</div>` : ''}

  ${!S.meta.welcomed ? `
  <div class="notice fadein">${sparkTxt} <b>Excel envanterin içe aktarıldı</b> — ${prodsA().length} ürün, ${catsA().length} kategori, ${roomsA().length} oda. Salon sayfasındaki birebir kopya satırlar (19 adet) tekilleştirildi. Artık her şey burada yaşıyor. <button style="font-weight:800;color:var(--on-indigo)" id="wel-ok">Anladım</button></div>` : ''}
  `;
}
function roomCard(r){
  const ps = roomProds(r.id);
  const pool = progPool(ps);
  const done = pool.filter(isDone).length;
  const pct = pool.length ? Math.round(done / pool.length * 100) : 0;
  const lite = lightRoom(r.color);
  const fg = lite ? 'var(--brown)' : 'var(--cream)';
  return `<button class="room-card ${lite ? 'lite' : ''}" data-room="${r.id}" style="background:${r.color};color:${fg}">
    <span class="ricon">${RICONS[r.icon] || RICONS.home}</span>
    <div class="nm serif">${esc(r.name)}</div>
    <div>
      <div class="room-row-ft"><span class="cnt">${done}/${pool.length} ürün</span><span class="pct serif">${pct}<sup>%</sup></span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
  </button>`;
}
function insRow(i){
  const conf = {
    dup:  { bg:'var(--chip-terra)',  fg:'var(--terra)', ic:'⧉' },
    prio: { bg:'var(--chip-indigo)', fg:'var(--on-indigo)', ic:'!' },
    exp:  { bg:'var(--chip-plum)',   fg:'var(--plum)', ic:'₺' },
    stale:{ bg:'var(--chip-sage)',   fg:'var(--ok)', ic:sparkTxt },
  }[i.type];
  return `<button class="ins" data-ins='${esc(JSON.stringify(i.ids))}' style="width:100%;text-align:left">
    <div class="ic" style="background:${conf.bg};color:${conf.fg};font-weight:800;font-size:14px">${conf.ic}</div>
    <div class="bd"><div class="t">${i.t}</div><div class="d">${esc(i.d)}</div></div>
    <span style="color:var(--ink-3)">${I.right}</span>
  </button>`;
}

/* ——— INVENTORY ——— */
function matchesFilters(p){
  if (F.q){ const q = trLow(F.q); if (!trLow(p.name).includes(q) && !trLow(p.brand).includes(q) && !trLow(p.model).includes(q)) return false; }
  if (F.status.length && !F.status.includes(p.status)) return false;
  if (F.prio.length && !F.prio.includes(p.priority)) return false;
  if (F.acq.length && !(p.status === 'tamam' && F.acq.includes(p.acq))) return false;
  if (F.tags.length && !F.tags.every(t => p.tags.includes(t))) return false;
  if (F.roomId && p.roomId !== F.roomId) return false;
  return true;
}
const filtersLive = () => F.q || filterCount() > 0;

function invBody(){
  const searching = filtersLive();
  let body;
  if (searching){
    const hits = prodsA().filter(matchesFilters);
    body = hits.length
      ? `<div class="plist fadein">${hits.slice(0, 200).map(p => prodRow(p, { ctx:true })).join('')}</div>
         ${hits.length > 200 ? `<p class="empty" style="padding:14px">İlk 200 sonuç gösteriliyor</p>` : ''}`
      : `<div class="empty"><img class="brandmark dim" src="${BRAND}" alt=""><div class="t serif">Sonuç yok</div><div class="d">Aramayı veya filtreleri gevşetmeyi dene.</div></div>`;
    body = `<div style="display:flex;align-items:center;justify-content:space-between;margin:2px 2px 10px">
      <span class="count-b">${hits.length} sonuç</span>
      <button class="act" style="font-size:12.5px;font-weight:800;color:var(--on-indigo)" id="clear-f">Temizle</button></div>` + body;
  } else if (invRoom){
    body = roomDetail(invRoom);
  } else {
    body = `<div class="rooms fadein">${roomsA().map(roomCard).join('')}</div>
      ${sortMode ? `<div class="card" style="margin-top:14px;padding:6px 8px" id="room-sort">${roomsA().map(r =>
        `<div class="frow" data-id="${r.id}" style="padding:10px 8px"><span class="drag-handle">${I.drag}</span><span style="flex:1;font-weight:700">${esc(r.name)}</span>
         <button class="pill" data-edroom="${r.id}" style="padding:5px 11px">${I.pen}</button></div>`).join('')}</div>` : ''}
      <div class="two" style="margin-top:14px">
        <button class="btn ghost sm" style="width:100%;padding:12px" id="add-room">${I.plus} Oda ekle</button>
        <button class="btn ghost sm" style="width:100%;padding:12px" id="sort-rooms">${sortMode ? 'Bitti' : 'Düzenle / Sırala'}</button>
      </div>`;
  }
  return body;
}
function renderInv(){
  return `
  ${pageHead('Oda → Kategori → Ürün', '<em>Envanter</em>')}
  <div class="search">
    ${I.search}
    <input id="q" placeholder="Ürün, marka ara…" value="${esc(F.q)}" autocomplete="off">
    <button class="fbtn" id="open-f" aria-label="Filtreler">${I.filter}${filterCount() ? `<span class="badge">${filterCount()}</span>` : ''}</button>
  </div>
  <div id="inv-body">${invBody()}</div>`;
}

function roomDetail(rid){
  const r = room(rid);
  if (!r) { invRoom = null; return ''; }
  const cats = catsA(rid);
  const ps = roomProds(rid);
  const pool = progPool(ps);
  const done = pool.filter(isDone).length;
  const pct = pool.length ? Math.round(done / pool.length * 100) : 0;
  const rval = ps.reduce((a, p) => a + (p.listPrice ?? p.price ?? 0), 0);
  return `
  <div class="fadein">
  <button style="display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--ink-2);margin:2px 0 10px" id="back-rooms">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg> Odalar
  </button>
  <div class="card" style="display:flex;align-items:center;gap:14px;padding:16px">
    <div style="width:44px;height:44px;border-radius:14px;background:${r.color};flex:none;display:grid;place-items:center;color:${lightRoom(r.color) ? 'var(--brown)' : 'var(--cream)'};font-family:var(--serif);font-size:19px">${RICONS[r.icon] || RICONS.home}</div>
    <div style="flex:1;min-width:0">
      <div style="font-family:var(--serif);font-size:20px">${esc(r.name)}</div>
      <div style="font-size:12px;color:var(--ink-2);margin-top:1px">${done}/${pool.length} ürün · %${pct}${rval ? ` · tahmini ${fmtMoney(rval)}` : ''}${S.settings.includeLow ? '' : (ps.length - pool.length ? ` · +${ps.length - pool.length} düşük öncelik` : '')}</div>
      <div class="iprog"><i style="width:${pct}%"></i></div>
    </div>
    <button class="pill" data-edroom="${r.id}" style="padding:7px 12px">${I.pen}</button>
  </div>
  <div class="two" style="margin-top:12px">
    <button class="btn ghost sm" style="width:100%;padding:11px" data-addcat="${rid}">${I.plus} Kategori</button>
    <button class="btn ghost sm" style="width:100%;padding:11px" id="sort-toggle">${sortMode ? 'Sıralama bitti' : 'Sırala'}</button>
  </div>
  ${cats.length ? (sortMode
    ? `<div id="cat-sort" style="margin-top:6px">${cats.map(c => catBlock(c, true)).join('')}</div>`
    : cats.map(c => catBlock(c, false)).join(''))
    : `<div class="empty"><img class="brandmark dim" src="${BRAND}" alt=""><div class="t serif">Henüz kategori yok</div><div class="d">İlk kategoriyi ekleyerek başla.</div></div>`}
  </div>`;
}
function catBlock(c, sortable){
  const ps = catProds(c.id);
  const pool = progPool(ps);
  const done = pool.filter(isDone).length;
  return `<div data-id="${c.id}" class="catblock">
    <div class="cat-h">
      <div style="display:flex;align-items:center;gap:8px">
        ${sortable ? `<span class="drag-handle">${I.drag}</span>` : ''}
        <span class="t">${esc(c.name)}</span>
        <button data-edcat="${c.id}" style="color:var(--ink-3)">${I.pen}</button>
      </div>
      <span class="n">${done}/${pool.length}</span>
    </div>
    ${ps.length ? `<div class="plist" ${sortable ? `data-psort="${c.id}"` : ''}>${ps.map(p => prodRow(p, { sortable })).join('')}</div>`
    : `<div class="plist"><div style="padding:13px 16px;font-size:13px;color:var(--ink-3)">Bu kategoride ürün yok</div></div>`}
  </div>`;
}
function prodRow(p, { ctx = false, sortable = false } = {}){
  const done = isDone(p);
  const price = p.price ?? p.listPrice;
  const meta = [];
  if (ctx) meta.push(`${esc(room(p.roomId)?.name || '')} ${sparkTxt} ${esc(cat(p.catId)?.name || '')}`);
  if (p.brand) meta.push(esc(p.brand));
  if (p.tags.length) meta.push(p.tags.slice(0,2).map(esc).join(', '));
  return `<button class="prow" data-prod="${p.id}" data-idsort="${p.id}" data-id="${p.id}">
    ${sortable ? `<span class="drag-handle">${I.drag}</span>` : `<span class="tick ${done ? 'on' : ''}" data-tick="${p.id}">${I.tick}</span>`}
    <span class="bd">
      <span class="nm ${done ? 'done' : ''}" style="display:block">${p.priority ? `<span class="prio-dot prio-${p.priority}" style="margin-right:6px;vertical-align:2px"></span>` : ''}${esc(p.name)}</span>
      <span class="mt">${stChip(p)}${meta.length ? `<span style="overflow:hidden;text-overflow:ellipsis">${meta.join(' · ')}</span>` : ''}</span>
    </span>
    ${price != null ? `<span class="pr">${fmtMoney(price)}</span>` : ''}
    ${p.alts?.some(a => a.st === 'a') ? `<span style="color:var(--plum);font-size:12px">${sparkTxt}</span>` : ''}
  </button>`;
}
</script>
<script>
/* ——— WISHLIST ——— */
function renderWish(){
  const items = prodsA().filter(p => p.status === 'wishlist' || p.alts.length);
  return `
  ${pageHead('Karşılaştır, seç, arşivle', '<em>Wishlist</em>')}
  ${items.length ? items.map(wishCard).join('') : `
    <div class="empty" style="margin-top:30px"><img class="brandmark dim" src="${BRAND}" alt="">
    <div class="t serif">Wishlist boş</div>
    <div class="d">Bir ürünün durumunu <b>Wishlist</b> yap veya ürün detayından alternatif ekle;<br>karşılaştırma burada yaşar.</div></div>`}`;
}
function wishCard(p){
  const acts = p.alts.filter(a => a.st !== 'x');
  const arch = p.alts.filter(a => a.st === 'x');
  const prices = acts.map(a => a.price).filter(n => n != null);
  const min = prices.length ? Math.min(...prices) : null;
  return `<div class="card fadein" style="margin-top:14px;padding:16px 16px 12px">
    <button data-prod="${p.id}" style="display:flex;align-items:center;gap:10px;width:100%;text-align:left">
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:15.5px">${esc(p.name)}</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:1px">${esc(room(p.roomId)?.name || '')} · ${esc(cat(p.catId)?.name || '')}</div>
      </div>
      ${stChip(p)}
    </button>
    <div style="margin-top:6px">
    ${acts.length ? acts.map(a => altRow(p, a, min)).join('') : `<div style="font-size:12.5px;color:var(--ink-3);padding:10px 0">Henüz alternatif yok</div>`}
    </div>
    ${arch.length ? `<details><summary style="font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--ink-3);padding:8px 0;cursor:pointer;list-style:none">ARŞİV · ${arch.length}</summary>${arch.map(a => altRow(p, a, null)).join('')}</details>` : ''}
    <button class="btn ghost sm" style="margin-top:8px" data-addalt="${p.id}">${I.plus} Alternatif ekle</button>
  </div>`;
}
function altRow(p, a, min){
  const won = a.st === 's', archd = a.st === 'x';
  const best = min != null && a.price === min && !won;
  return `<div class="alt ${won ? 'won' : ''} ${archd ? 'arch' : ''}">
    <div class="bd" data-altedit='${p.id}|${a.id}' style="cursor:pointer">
      <div class="nm">${esc(a.name)}${a.url ? ` <a href="${esc(a.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--on-indigo);vertical-align:-2px">${I.link}</a>` : ''}</div>
      <div class="mt">${[a.price != null ? fmtMoney(a.price) + (best ? ' · en uygun' : '') : null, a.note ? esc(a.note) : null].filter(Boolean).join(' · ') || '&nbsp;'}</div>
    </div>
    ${won ? `<span class="pk done">Seçildi</span>`
      : archd ? `<button class="pk" data-altback='${p.id}|${a.id}'>Geri al</button>`
      : `<button class="pk" data-altpick='${p.id}|${a.id}'>Bunu seç</button>`}
    ${!won ? `<button style="color:var(--ink-3)" data-altdel='${p.id}|${a.id}'>${I.x}</button>` : ''}
  </div>`;
}

/* ——— FINANCE ——— */
function renderFin(){
  const f = finance();
  const PAL = ['var(--indigo)','var(--terra)','var(--plum)','var(--sage)','var(--brown)','#C9962E'];
  const _seen = {}; let _ci = 0;
  const cc = c => _seen[c] ?? (_seen[c] = PAL[_ci++ % PAL.length]);
  const i0 = ymIdx(ymNow());
  const realSpan = Math.max(12, Math.min(24, f.remMonths));
  const months = Array.from({ length: realSpan }, (_, k) => i0 + k);
  const maxM = Math.max(1, ...months.map(i => Object.values(f.upcoming[i] || {}).reduce((a,b)=>a+b,0)));
  const tots = months.map(i => Object.values(f.upcoming[i] || {}).reduce((a,b)=>a+b,0));
  const dotCls = t => !t ? '' : t <= maxM*.25 ? 'lo' : t <= maxM*.5 ? 'mid' : t <= maxM*.75 ? 'hi' : 'max';
  const ov = [];
  ov.push(['Envanter Değeri', fmtMoney(f.acqVal), `${prodsA().filter(isDone).length} tamamlanan ürün`]);
  ov.push(['Cepten Çıkan', fmtMoney(f.pocket), `${f.pocketCnt} satın alım${f.unpriced ? ` · ${f.unpriced} fiyatsız` : ''}`]);
  ov.push(['Tasarruf', f.savedPct == null ? '—' : '%' + Math.round(f.savedPct * 100), f.savedPct == null ? 'piyasa fiyatı gir' : fmtMoney(f.saved) + ' cepte kaldı']);
  if (f.giftVal) ov.push(['Hediye Değeri', fmtMoney(f.giftVal), 'sevgiyle geldi ' + sparkTxt]);
  if (f.ownedVal) ov.push(['Evde Olanlar', fmtMoney(f.ownedVal), 'zaten senindi']);
  if (f.remainEst) ov.push(['Kalan Alım Tahmini', fmtMoney(f.remainEst), f.remainMiss ? `+${f.remainMiss} ürün fiyatsız` : 'fiyatı bilinenler']);
  if (f.wishEst) ov.push(['Wishlist Tahmini', fmtMoney(f.wishEst), f.wishMiss ? `+${f.wishMiss} fiyatsız` : 'en uygun alternatiflerle']);
  return `
  ${pageHead('Otomatik hesap · elle sıfır', '<em>Finans</em>')}
  <div class="fin-hero">
    <div class="lb">Güncel Kart Borcu <span style="float:right">${sparkTxt}</span></div>
    <div class="big serif">${fmtMoney(f.debt)}</div>
    <div class="row3">
      <div><div class="lb">Bu ay</div><div class="v2">${fmtMoney(f.month)}</div></div>
      <div><div class="lb">Kalan taksit</div><div class="v2">${f.remMonths ? f.remMonths + ' ay' : '—'}</div></div>
      <div><div class="lb">Cepten çıkan</div><div class="v2">${fmtMoney(f.pocket)}</div></div>
    </div>
  </div>

  <div class="section-h"><div class="eyebrow">Genel Bakış</div></div>
  <div class="ovgrid">
    ${ov.map(([l, v, d]) => `<div class="stat"><div class="lb">${l}</div><div class="v serif" style="font-size:19px">${v}</div><div class="sub">${d}</div></div>`).join('')}
  </div>

  <div class="section-h"><div class="eyebrow">Önümüzdeki ${realSpan} Ay</div></div>
  <div class="card" style="padding:14px 14px 12px">
    ${f.lastIdx >= i0 ? `
    <div class="mrows">
      ${months.map((i, k) => {
        const seg = f.upcoming[i] || {}; const tot = tots[k];
        const ym = idxYm(i);
        const mn = new Date(ym + '-01T00:00:00').toLocaleDateString('tr-TR', { month:'short' }).replace('.', '');
        const lab = (k === 0 || ym.endsWith('-01')) ? `${mn} '${ym.slice(2, 4)}` : mn;
        const prev = k ? tots[k - 1] : 0;
        const mom = k && prev > 0 && tot > 0 ? Math.round((tot - prev) / prev * 100) : null;
        return `<button class="mrow ${tot ? '' : 'zero'}" data-mon="${i}">
          <span class="mr-dot ${dotCls(tot)}"></span>
          <span class="mr-l">${lab}</span>
          <span class="mr-track">${tot ? Object.entries(seg).map(([c, v]) =>
            `<i style="width:${v / maxM * 100}%;background:${cc(c)}"></i>`).join('') : ''}</span>
          <span class="mr-v">${tot ? fmtMoney(tot) : '—'}${mom != null && mom !== 0 ? `<span class="mom">${mom < 0 ? '↓' : '↑'}${Math.abs(mom)}%</span>` : ''}</span>
        </button>`; }).join('')}
    </div>
    <div class="legend">${Object.entries(f.cards).map(([c, v]) => `<span class="lg"><i style="background:${cc(c)}"></i>${esc(c)} · ${fmtMoney(v)}</span>`).join('')}</div>`
    : `<div class="empty" style="padding:14px"><img class="brandmark dim" src="${BRAND}" alt=""><div class="d">Aktif taksit planı yok — peşin gidiyorsun ${sparkTxt}</div></div>`}
  </div>

  ${(() => { const instP = prodsA().filter(p => isBought(p) && p.instCount && p.price != null && p.instStart);
    if (!instP.length) return '';
    return `
  <div class="section-h"><div class="eyebrow">Taksitli Ürünler</div></div>
  <div class="card plist" style="padding:4px 6px">
    ${instP.map(p => { const x = finOf(p); return `
      <button class="prow" data-prod="${p.id}">
        <span class="bd">
          <span class="nm">${esc(p.name)}</span>
          <span class="mt">${esc(p.card || 'Kart yok')} · ayda ${fmtMoney(x.monthly)} · ${x.paid}/${p.instCount}</span>
          <span class="iprog"><i style="width:${x.paid / p.instCount * 100}%"></i></span>
        </span>
        <span class="pr">${fmtMoney(x.remain)}</span>
      </button>`; }).join('')}
  </div>`; })()}`;
}

function renderSet(){
  const themes = [['system','Oto'],['light','Açık'],['dark','Koyu']];
  const syncOn = !!S.settings.clientId && Sync.enabled();
  const dot = Sync.status === 'ok' ? 'ok' : (Sync.status === 'error' || Sync.status === 'noauth') ? 'err' : 'off';
  const stTxt = { off:'Kapalı', ok:'Bağlı', syncing:'Eşitleniyor…', error:'Hata', noauth:'Yeniden bağlan' }[Sync.status] || 'Kapalı';
  return `
  ${pageHead('Kişiselleştir', '<em>Ayarlar</em>')}
  <div class="section-h"><div class="eyebrow">Hedef</div></div>
  <div class="card" style="padding:5px 0">
    <button class="set-row" id="ed-count"><span><span class="k">Geri sayım</span><div class="d">${esc(S.settings.title)} · ${fmtDateTR(S.settings.date)}</div></span><span class="v">${I.right}</span></button>
  </div>

  <div class="section-h"><div class="eyebrow">Görünüm</div></div>
  <div class="card" style="padding:5px 0">
    <div class="set-row"><span class="k">Tema</span>
      <div class="seg-ctl">${themes.map(([id,l]) => `<button data-theme-set="${id}" class="${S.settings.theme === id ? 'on' : ''}">${l}</button>`).join('')}</div>
    </div>
    <div class="set-row"><span class="k">Para birimi</span>
      <div class="seg-ctl">${['₺','€','$'].map(c => `<button data-cur="${c}" class="${S.settings.currency === c ? 'on' : ''}">${c}</button>`).join('')}</div>
    </div>
    <div class="set-row"><span><span class="k">Oda ilerlemesi</span><div class="d">Düşük öncelikliler bilinçli olarak sona bırakılmış işler; kapalıyken yüzdeye girmezler.</div></span>
      <div class="seg-ctl">${[['0','Hariç'],['1','Dahil']].map(([v,l]) => `<button data-inclow="${v}" class="${(S.settings.includeLow ? '1' : '0') === v ? 'on' : ''}">${l}</button>`).join('')}</div>
    </div>
  </div>

  <div class="section-h"><div class="eyebrow">Eşitleme</div></div>
  <div class="card" style="padding:5px 0">
    <div class="set-row"><span><span class="k">Google Drive</span><div class="d">Veriler kendi Drive'ında, uygulamaya özel gizli klasörde saklanır.</div></span>
      <span class="v"><span class="sync-dot ${dot}"></span>${stTxt}</span></div>
    <div style="padding:4px 16px 14px">
      <input class="inp" id="cid" placeholder="Google OAuth Client ID (…apps.googleusercontent.com)" value="${esc(S.settings.clientId)}" autocomplete="off" style="font-size:12.5px">
      <div class="two">
        <button class="btn sm ghost" style="width:100%" id="sync-save">Kaydet</button>
        ${syncOn ? `<button class="btn sm ghost" style="width:100%" id="sync-off">Bağlantıyı kes</button>`
                  : `<button class="btn sm" style="width:100%;background:var(--indigo);color:var(--cream)" id="sync-on">${I.cloud} Bağlan</button>`}
      </div>
      ${Sync.lastAt ? `<div style="font-size:11px;color:var(--ink-3);margin-top:8px">Son eşitleme: ${new Date(Sync.lastAt).toLocaleString('tr-TR')}</div>` : ''}
      <div style="font-size:11px;color:var(--ink-3);margin-top:6px">Kurulum adımları README dosyasında.</div>
    </div>
  </div>

  <div class="section-h"><div class="eyebrow">Gelişmiş</div></div>
  <div class="card" style="padding:5px 0">
    <button class="set-row" id="exp-json"><span class="k">Verileri dışa aktar</span><span class="v">JSON</span></button>
    <button class="set-row" id="imp-json"><span class="k">Yedekten geri yükle</span><span class="v">JSON</span></button>
    <button class="set-row" id="reset-all"><span class="k" style="color:var(--terra)">Tüm verileri sıfırla</span><span class="v"></span></button>
    <input type="file" id="imp-file" accept="application/json" class="hidden">
  </div>
  <p style="text-align:center;font-size:11px;color:var(--ink-3);margin-top:22px">Gelecek Envanteri ${sparkTxt} v${VERSION}${store.persistent ? '' : ' · <b style="color:var(--terra)">geçici depolama modu</b>'}</p>`;
}
</script>
<script>
/* ═══════════════════ SHEETS ═══════════════════ */

/* — product detail — */
function productSheet(pid){
  const p = prod(pid); if (!p) return;
  const rec = openSheet(`
    ${sheetHead(esc(p.name), `${esc(room(p.roomId)?.name || '')} · ${esc(cat(p.catId)?.name || '')}`)}
    <div class="sh-b" id="ps">
      <div class="sect always">
        <div class="in">
          <div class="frow"><span class="k">Ürün adı</span><span class="v"><input data-f="name" value="${esc(p.name)}"></span></div>
          <div class="frow"><span class="k">Konum</span><span class="v"><button data-move="${p.id}" style="color:var(--on-indigo);font-weight:700">${esc(room(p.roomId)?.name)} · ${esc(cat(p.catId)?.name)} ${I.right}</button></span></div>
          <div class="frow" style="display:block"><span class="k" style="display:block;margin-bottom:8px">Durum</span><div class="pill-row" id="ps-st">${statusChips(p.status)}</div></div>
          <div class="frow hidden" id="ps-acq-w" style="display:block"><span class="k" style="display:block;margin-bottom:8px">Edinim</span><div class="pill-row" id="ps-acq"></div></div>
          <div class="frow" style="display:block"><span class="k" style="display:block;margin-bottom:8px">Öncelik</span><div class="pill-row" id="ps-pr">${prioChips(p.priority)}</div></div>
          <div class="frow"><span class="k">Marka</span><span class="v"><input data-f="brand" value="${esc(p.brand)}" placeholder="Ekle"></span></div>
          <div class="frow"><span class="k">Model</span><span class="v"><input data-f="model" value="${esc(p.model)}" placeholder="Ekle"></span></div>
          <div class="frow" style="display:block"><span class="k" style="display:block;margin-bottom:6px">Notlar</span><textarea class="inp" data-f="notes" rows="2" placeholder="Kendine not…" style="border:0;padding:2px 0;background:none;min-height:auto">${esc(p.notes)}</textarea></div>
        </div>
      </div>

      <details class="sect" id="ps-sec-res">
        <summary>Araştırma ${I.chev}</summary>
        <div class="in">
          <div class="sub-h">Alışveriş bağlantıları</div>
          <div id="ps-links"></div>
          <div class="sub-h" style="margin-top:16px">Alternatifler</div>
          <div id="ps-alts"></div>
        </div>
      </details>

      <details class="sect" id="ps-sec-buy">
        <summary>Satın Alma ${I.chev}</summary>
        <div class="in" id="ps-buy"></div>
      </details>

      <details class="sect" id="ps-sec-org" ${p.tags.length ? 'open' : ''}>
        <summary>Düzenleme ${I.chev}</summary>
        <div class="in">
          <div class="pill-row" id="ps-tg"></div>
        </div>
      </details>

      <button class="btn danger" data-delprod="${p.id}">${I.trash} Ürünü sil</button>
      <datalist id="cards-dl">${usedCards().map(c => `<option value="${esc(c)}">`).join('')}</datalist>
      <datalist id="stores-dl">${[...new Set(prodsA().map(x => x.store).filter(Boolean))].map(c => `<option value="${esc(c)}">`).join('')}</datalist>
    </div>`);

  const sh = rec.sh;

  const hasResearch = () => p.links.length || p.alts.length;
  const hasBuyData = () => p.listPrice != null || p.price != null || p.store || p.instCount || p.acqDate;

  const refreshAcq = () => {
    const w = $('#ps-acq-w', sh);
    w.classList.toggle('hidden', p.status !== 'tamam');
    if (p.status === 'tamam')
      $('#ps-acq', sh).innerHTML = ACQS.map(a => `<button class="pill ${p.acq === a.id ? 'on' : ''}" data-acq="${a.id}">${a.label}</button>`).join('');
  };

  const buyRows = () => {
    const satin = p.acq === 'satin' || p.status !== 'tamam';
    const x = finOf(p);
    let h = `<div class="frow"><span class="k">Piyasa fiyatı</span><span class="v"><input data-money="listPrice" inputmode="decimal" value="${p.listPrice ?? ''}" placeholder="—"></span></div>`;
    if (satin) h += `
      <div class="frow"><span class="k">Alış fiyatı</span><span class="v"><input data-money="price" inputmode="decimal" value="${p.price ?? ''}" placeholder="—"></span></div>
      <div class="frow"><span class="k">Mağaza</span><span class="v"><input data-f="store" value="${esc(p.store)}" placeholder="Ekle" list="stores-dl"></span></div>`;
    h += `<div class="frow"><span class="k">${p.acq === 'hediye' ? 'Hediye tarihi' : p.acq === 'evde' ? 'Edinme tarihi' : 'Alış tarihi'}</span><span class="v"><input data-f="acqDate" type="date" value="${p.acqDate ?? ''}"></span></div>`;
    if (satin) h += `
      <div class="frow"><span class="k">Kredi kartı</span><span class="v"><input data-f="card" value="${esc(p.card)}" placeholder="Ekle" list="cards-dl"></span></div>
      <div class="frow"><span class="k">Taksit sayısı</span><span class="v"><input data-int="instCount" inputmode="numeric" value="${p.instCount ?? ''}" placeholder="—"></span></div>
      <div class="frow"><span class="k">Taksit başlangıcı</span><span class="v" style="display:flex;gap:6px;justify-content:flex-end">
        <select data-instm style="font:inherit;font-weight:600;color:inherit;background:none;text-align:right"><option value="">— Ay</option>${['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'].map((m,i)=>{const v=String(i+1).padStart(2,'0');return `<option value="${v}" ${p.instStart?.slice(5)===v?'selected':''}>${m}</option>`;}).join('')}</select>
        <select data-insty style="font:inherit;font-weight:600;color:inherit;background:none"><option value="">Yıl</option>${Array.from({length:9},(_,i)=>2024+i).map(y=>`<option ${p.instStart?.slice(0,4)==String(y)?'selected':''}>${y}</option>`).join('')}</select>
      </span></div>
      <div class="frow"><span class="k">Hesap</span><span class="v ghosty" id="ps-buy-v"></span></div>`;
    else if (p.status === 'tamam') h += `<div style="font-size:12px;color:var(--ink-3);padding:8px 0 2px">${p.acq === 'hediye' ? 'Hediye — cebinden çıkmadı; piyasa fiyatı tasarrufuna yazılır.' : 'Zaten vardı — cebinden çıkmadı; piyasa fiyatı tasarrufuna yazılır.'}</div>`;
    return h;
  };
  const refreshBuy = () => {
    $('#ps-buy', sh).innerHTML = buyRows();
    const v = $('#ps-buy-v', sh);
    if (v){
      const x = finOf(p);
      v.textContent = x.monthly
        ? `ayda ${fmtMoney(x.monthly)} · ${x.paid}/${p.instCount} ödendi · kalan ${fmtMoney(x.remain)}`
        : p.price == null ? 'önce alış fiyatını gir'
        : !p.instCount ? 'Peşin ödeme · taksit yok'
        : 'taksit başlangıç ayını seç';
    }
    const sec = $('#ps-sec-buy', sh);
    let nud = $('#ps-nudge', sh);
    if (p.status === 'tamam' && !hasBuyData()){
      sec.open = true;
      if (!nud){
        nud = document.createElement('div'); nud.id = 'ps-nudge';
        nud.style.cssText = 'font-size:12px;color:var(--terra);padding:0 0 8px';
        nud.textContent = 'Tamamlandı ' + sparkTxt + ' — istersen fiyat bilgilerini de ekleyelim.';
        $('#ps-buy', sh).prepend(nud);
      }
    } else if (nud) nud.remove();
  };
  const refreshTags = () => {
    $('#ps-tg', sh).innerHTML = p.tags.map(t =>
      `<span class="pill on" style="gap:7px">${esc(t)}<button data-rmtag="${esc(t)}" style="color:inherit;opacity:.7">${I.x}</button></span>`).join('')
      + `<button class="pill" id="ps-addtag">${I.plus} Etiket</button>`;
  };
  const refreshAlts = () => {
    const acts = p.alts.filter(a => a.st !== 'x'), arch = p.alts.filter(a => a.st === 'x');
    const prices = acts.map(a => a.price).filter(n => n != null);
    const min = prices.length ? Math.min(...prices) : null;
    $('#ps-alts', sh).innerHTML =
      (p.alts.length ? acts.map(a => altRow(p, a, min)).join('') + arch.map(a => altRow(p, a, null)).join('') : `<div style="font-size:12.5px;color:var(--ink-3);padding:4px 0">Alternatif ekle, fiyatları yan yana gör — burası karar masası.</div>`)
      + `<button class="btn ghost sm" style="margin-top:10px" data-addalt="${p.id}">${I.plus} Alternatif ekle</button>`;
  };
  const refreshLinks = () => {
    $('#ps-links', sh).innerHTML =
      p.links.map(l => `<div class="linkrow">
        <span style="color:var(--on-indigo)">${I.link}</span>
        <a class="u" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label || l.url.replace(/^https?:\/\/(www\.)?/,'').split('/')[0])}</a>
        <button class="x" data-rmlink="${l.id}">${I.x}</button></div>`).join('')
      + `<button class="btn ghost sm" style="margin-top:8px" id="ps-addlink">${I.plus} Bağlantı ekle</button>`;
  };
  const refreshOpen = () => {
    $('#ps-sec-res', sh).open = hasResearch() || ['arastiriliyor','wishlist'].includes(p.status);
    if (p.status === 'tamam' && hasBuyData()) $('#ps-sec-buy', sh).open = true;
  };
  refreshAcq(); refreshBuy(); refreshTags(); refreshAlts(); refreshLinks(); refreshOpen();

  sh.addEventListener('change', e => {
    const t = e.target;
    if (t.dataset.f !== undefined){
      const k = t.dataset.f, v = t.value.trim();
      if (k === 'name' && !v){ t.value = p.name; return; }
      p[k] = (k === 'acqDate') ? (v || null) : v;
      touch(p); save({ silent:true }); refreshBuy();
      if (k === 'name') $('.sh-t', sh).textContent = p.name;
      render();
    }
    if (t.dataset.money !== undefined){ p[t.dataset.money] = parseMoney(t.value); touch(p); save({silent:true}); refreshBuy(); render(); }
    if (t.dataset.int !== undefined){ const n = parseInt(t.value, 10); p[t.dataset.int] = isNaN(n) || n < 0 ? null : n; touch(p); save({silent:true}); refreshBuy(); render(); }
    if (t.dataset.instm !== undefined || t.dataset.insty !== undefined){
      const m = $('[data-instm]', sh).value, y = $('[data-insty]', sh).value;
      p.instStart = m && y ? `${y}-${m}` : null;
      touch(p); save({silent:true}); refreshBuy(); render();
    }
  });
  sh.addEventListener('click', e => {
    const st = e.target.closest('[data-st]');
    if (st){ setStatus(p, st.dataset.st, e); $('#ps-st', sh).innerHTML = statusChips(p.status); refreshAcq(); refreshBuy(); refreshOpen(); return; }
    const aq = e.target.closest('[data-acq]');
    if (aq){ setAcq(p, aq.dataset.acq); refreshAcq(); refreshBuy(); return; }
    const pr = e.target.closest('[data-prio]');
    if (pr){ p.priority = pr.dataset.prio || null; touch(p); save({silent:true}); $('#ps-pr', sh).innerHTML = prioChips(p.priority); render(); return; }
    const rt = e.target.closest('[data-rmtag]');
    if (rt){ p.tags = p.tags.filter(x => x !== rt.dataset.rmtag); touch(p); save({silent:true}); refreshTags(); render(); return; }
    if (e.target.closest('#ps-addtag')){ tagPickSheet(p, refreshTags); return; }
    if (e.target.closest('#ps-addlink')){ linkSheet(p, refreshLinks); return; }
    const rl = e.target.closest('[data-rmlink]');
    if (rl){ p.links = p.links.filter(l => l.id !== rl.dataset.rmlink); touch(p); save({silent:true}); refreshLinks(); return; }
    const mv = e.target.closest('[data-move]');
    if (mv){ moveSheet(p, () => { closeSheet(rec); productSheet(p.id); }); return; }
    const dp = e.target.closest('[data-delprod]');
    if (dp){ confirmSheet({ title:'Ürünü sil', body:`<b>${esc(p.name)}</b> envanterden kaldırılacak.`, okLabel:'Sil', danger:true }, () => { p.deleted = now(); touch(p); save(); closeSheet(rec); toast('Ürün silindi'); }); return; }
    if (handleAltClick(e, () => { refreshAlts(); })) return;
  });
}

function setStatus(p, st, e){
  if (st === p.status) return;
  if (st === 'tamam' && !isDone(p)){
    p.prevStatus = p.status;
    p.acq = p.acq || 'satin';
    p.purchasedAt = now();
    p.acqDate = p.acqDate || new Date().toISOString().slice(0, 10);
    if (e) sparkle(e.clientX || innerWidth/2, e.clientY || innerHeight/2);
    toast('Tamamlandı ' + sparkTxt);
  }
  if (st !== 'tamam'){ p.acq = null; p.purchasedAt = null; }
  p.status = st; touch(p); save({ silent:true }); render();
}
function setAcq(p, acq){
  if (p.status !== 'tamam' || p.acq === acq) return;
  p.acq = acq; touch(p); save({ silent:true }); render();
}

/* — tag picker — */
function tagPickSheet(p, done){
  const all = usedTags().filter(t => !p.tags.includes(t));
  const rec = openSheet(`
    ${sheetHead('Etiket ekle')}
    <div class="sh-b">
      <div class="fld"><label>Yeni etiket</label>
        <div style="display:flex;gap:8px"><input class="inp" id="tg-new" placeholder="ör. Japandi, IKEA, İndirim Bekleniyor" style="flex:1">
        <button class="btn sm" style="background:var(--indigo);color:var(--cream);border-radius:var(--r-sm);padding:0 16px" id="tg-add">Ekle</button></div></div>
      ${all.length ? `<div class="fld"><label>Mevcut</label><div class="pill-row">${all.map(t => `<button class="pill" data-tgpick="${esc(t)}">${esc(t)}</button>`).join('')}</div></div>` : ''}
    </div>`);
  const add = name => {
    name = name.trim(); if (!name) return;
    if (!p.tags.includes(name)) p.tags.push(name);
    if (!S.tagBank.find(t => trLow(t.name) === trLow(name))) S.tagBank.push({ id:uid(), name, updatedAt:now() });
    touch(p); save({silent:true}); render(); closeSheet(rec); done();
  };
  $('#tg-add', rec.sh).addEventListener('click', () => add($('#tg-new', rec.sh).value));
  $('#tg-new', rec.sh).addEventListener('keydown', e => { if (e.key === 'Enter') add(e.target.value); });
  rec.sh.addEventListener('click', e => { const t = e.target.closest('[data-tgpick]'); if (t) add(t.dataset.tgpick); });
}

/* — link editor — */
function linkSheet(p, done){
  const rec = openSheet(`
    ${sheetHead('Bağlantı ekle')}
    <div class="sh-b">
      <div class="fld"><label>URL</label><input class="inp" id="lk-url" inputmode="url" placeholder="https://…"></div>
      <div class="fld"><label>Etiket · isteğe bağlı</label><input class="inp" id="lk-lb" placeholder="ör. Trendyol, IKEA"></div>
      <button class="btn" id="lk-ok">Ekle</button>
    </div>`);
  $('#lk-ok', rec.sh).addEventListener('click', () => {
    let url = $('#lk-url', rec.sh).value.trim(); if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    p.links.push({ id:uid(), url, label:$('#lk-lb', rec.sh).value.trim() });
    touch(p); save({silent:true}); closeSheet(rec); done();
  });
}

/* — alternative editor + actions — */
function altSheet(p, alt, done){
  const isNew = !alt;
  alt = alt || { id:uid(), name:'', price:null, url:'', note:'', st:'a' };
  const rec = openSheet(`
    ${sheetHead(isNew ? 'Alternatif ekle' : 'Alternatifi düzenle', esc(p.name))}
    <div class="sh-b">
      <div class="fld"><label>İsim / Marka</label><input class="inp" id="al-nm" value="${esc(alt.name)}" placeholder="ör. Philips Airfryer XL"></div>
      <div class="fld"><label>Fiyat</label><input class="inp" id="al-pr" inputmode="decimal" value="${alt.price ?? ''}" placeholder="—"></div>
      <div class="fld"><label>Bağlantı</label><input class="inp" id="al-ur" inputmode="url" value="${esc(alt.url)}" placeholder="https://…"></div>
      <div class="fld"><label>Not</label><input class="inp" id="al-nt" value="${esc(alt.note)}" placeholder="artı / eksi"></div>
      <button class="btn" id="al-ok">${isNew ? 'Ekle' : 'Kaydet'}</button>
    </div>`);
  $('#al-ok', rec.sh).addEventListener('click', () => {
    const nm = $('#al-nm', rec.sh).value.trim(); if (!nm) return;
    alt.name = nm;
    alt.price = parseMoney($('#al-pr', rec.sh).value);
    let u = $('#al-ur', rec.sh).value.trim(); alt.url = u && !/^https?:\/\//i.test(u) ? 'https://' + u : u;
    alt.note = $('#al-nt', rec.sh).value.trim();
    if (isNew){ p.alts.push(alt); if (p.status === 'ihtiyac') p.status = 'arastiriliyor'; }
    touch(p); save(); closeSheet(rec); done?.();
  });
}
function handleAltClick(e, after = () => {}){
  const pick = e.target.closest('[data-altpick]');
  if (pick){
    const [pid, aid] = pick.dataset.altpick.split('|');
    const p = prod(pid), a = p.alts.find(x => x.id === aid);
    confirmSheet({ title:'Bunu seç ' + sparkTxt, body:`<b>${esc(a.name)}</b> seçilecek; diğer alternatifler arşive kalkacak. Marka ve fiyat ürüne yazılır.`, okLabel:'Seç' }, () => {
      p.alts.forEach(x => x.st = x.id === aid ? 's' : 'x');
      if (!p.brand) p.brand = a.name;
      if (a.price != null && p.price == null) p.price = a.price;
      if (a.url && !p.links.find(l => l.url === a.url)) p.links.push({ id:uid(), url:a.url, label:a.name });
      if (p.status === 'wishlist' || p.status === 'arastiriliyor') p.status = 'alinacak';
      touch(p); save(); after(); sparkle(e.clientX, e.clientY); toast('Seçildi — diğerleri arşivde');
    });
    return true;
  }
  const back = e.target.closest('[data-altback]');
  if (back){ const [pid, aid] = back.dataset.altback.split('|'); const p = prod(pid); p.alts.find(x => x.id === aid).st = 'a'; touch(p); save(); after(); return true; }
  const del = e.target.closest('[data-altdel]');
  if (del){ const [pid, aid] = del.dataset.altdel.split('|'); const p = prod(pid); p.alts = p.alts.filter(x => x.id !== aid); touch(p); save(); after(); return true; }
  const add = e.target.closest('[data-addalt]');
  if (add){ altSheet(prod(add.dataset.addalt), null, after); return true; }
  const ed = e.target.closest('[data-altedit]');
  if (ed){ const [pid, aid] = ed.dataset.altedit.split('|'); const p = prod(pid); altSheet(p, p.alts.find(x => x.id === aid), after); return true; }
  return false;
}

/* — quick add — */
function quickAdd(){
  let rid = invRoom || roomsA()[0]?.id, cid = null;
  const rec = openSheet(`
    ${sheetHead('Hızlı ekle', '3 alan yeter — gerisi sonra')}
    <div class="sh-b">
      <div class="fld"><label>Ürün adı</label><input class="inp" id="qa-nm" placeholder="ör. Kahve makinesi" autocomplete="off"></div>
      <div class="fld"><label>Oda</label><div class="pill-row" id="qa-rooms"></div></div>
      <div class="fld"><label>Kategori</label><div class="pill-row" id="qa-cats"></div></div>
      <div class="fld hidden" id="qa-newcat-w"><label>Yeni kategori adı</label><input class="inp" id="qa-newcat" placeholder="ör. Küçük Elektrikli"></div>
      <div class="two"><button class="btn ghost" id="qa-more">Kaydet + Detay</button><button class="btn" id="qa-ok">Kaydet</button></div>
    </div>`);
  const sh = rec.sh;
  const paintRooms = () => { $('#qa-rooms', sh).innerHTML = roomsA().map(r => `<button class="pill ${r.id === rid ? 'on' : ''}" data-r="${r.id}">${esc(r.name)}</button>`).join(''); };
  const paintCats = () => {
    const cs = catsA(rid);
    if (!cid || !cs.find(c => c.id === cid)) cid = cs[0]?.id || null;
    $('#qa-cats', sh).innerHTML = cs.map(c => `<button class="pill ${c.id === cid ? 'on' : ''}" data-c="${c.id}">${esc(c.name)}</button>`).join('')
      + `<button class="pill ${cid === '__new' ? 'on' : ''}" data-c="__new">${I.plus} Yeni</button>`;
    $('#qa-newcat-w', sh).classList.toggle('hidden', cid !== '__new');
  };
  paintRooms(); paintCats();
  setTimeout(() => $('#qa-nm', sh).focus(), 350);
  sh.addEventListener('click', e => {
    const r = e.target.closest('[data-r]'); if (r){ rid = r.dataset.r; cid = null; paintRooms(); paintCats(); return; }
    const c = e.target.closest('[data-c]'); if (c){ cid = c.dataset.c; paintCats(); return; }
  });
  const doSave = openAfter => {
    const nm = $('#qa-nm', sh).value.trim();
    if (!nm){ $('#qa-nm', sh).focus(); return; }
    let catId = cid;
    if (cid === '__new'){
      const cn = $('#qa-newcat', sh).value.trim(); if (!cn){ $('#qa-newcat', sh).focus(); return; }
      const c = { id:uid(), roomId:rid, name:cn, order:catsA(rid).length, updatedAt:now() };
      S.cats.push(c); catId = c.id;
    }
    if (!catId){ toast('Önce bir kategori ekle'); return; }
    const t = now();
    const p = { id:uid(), name:nm, roomId:rid, catId, status:'ihtiyac', priority:null, acq:null, tags:[], links:[], alts:[],
      brand:'', model:'', notes:'', listPrice:null, price:null, card:'', store:'', acqDate:null, instCount:null, instStart:null,
      order:catProds(catId).length, createdAt:t, updatedAt:t };
    S.products.push(p); save(); closeSheet(rec);
    toast('Eklendi ' + sparkTxt);
    if (openAfter) productSheet(p.id);
  };
  $('#qa-ok', sh).addEventListener('click', () => doSave(false));
  $('#qa-more', sh).addEventListener('click', () => doSave(true));
  $('#qa-nm', sh).addEventListener('keydown', e => { if (e.key === 'Enter') doSave(false); });
}

/* — filters — */
function filterSheet(){
  const rec = openSheet(`
    ${sheetHead('Filtreler')}
    <div class="sh-b">
      <div class="fld"><label>Durum</label><div class="pill-row" id="ft-st"></div></div>

      <div class="two"><button class="btn ghost" id="ft-clear">Temizle</button><button class="btn" data-close>Uygula</button></div>
    </div>`);
  const sh = rec.sh;
  const paint = () => {
    $('#ft-st', sh).innerHTML = STATUSES.map(s => `<button class="pill ${F.status.includes(s.id) ? 'on' : ''}" data-fst="${s.id}">${s.label}</button>`).join('');
    $('#ft-aq', sh).innerHTML = ACQS.map(a => `<button class="pill ${F.acq.includes(a.id) ? 'on' : ''}" data-faq="${a.id}">${a.label}</button>`).join('');
    $('#ft-pr', sh).innerHTML = PRIOS.map(p => `<button class="pill ${F.prio.includes(p.id) ? 'on' : ''}" data-fpr="${p.id}"><span class="prio-dot prio-${p.id}"></span>${p.label}</button>`).join('');
    $('#ft-rm', sh).innerHTML = roomsA().map(r => `<button class="pill ${F.roomId === r.id ? 'on' : ''}" data-frm="${r.id}">${esc(r.name)}</button>`).join('');
    const tags = usedTags();
    $('#ft-tg', sh).innerHTML = tags.length ? tags.map(t => `<button class="pill ${F.tags.includes(t) ? 'on' : ''}" data-ftg="${esc(t)}">${esc(t)}</button>`).join('') : `<span style="font-size:12.5px;color:var(--ink-3)">Henüz etiket yok</span>`;
  };
  paint();
  const tgl = (arr, v) => { const i = arr.indexOf(v); i >= 0 ? arr.splice(i, 1) : arr.push(v); };
  sh.addEventListener('click', e => {
    const st = e.target.closest('[data-fst]'); if (st){ tgl(F.status, st.dataset.fst); paint(); render(); return; }
    const aq = e.target.closest('[data-faq]'); if (aq){ tgl(F.acq, aq.dataset.faq); paint(); render(); return; }
    const pr = e.target.closest('[data-fpr]'); if (pr){ tgl(F.prio, pr.dataset.fpr); paint(); render(); return; }
    const rm = e.target.closest('[data-frm]'); if (rm){ F.roomId = F.roomId === rm.dataset.frm ? null : rm.dataset.frm; paint(); render(); return; }
    const tg = e.target.closest('[data-ftg]'); if (tg){ tgl(F.tags, tg.dataset.ftg); paint(); render(); return; }
    if (e.target.closest('#ft-clear')){ F.status = []; F.prio = []; F.tags = []; F.acq = []; F.roomId = null; paint(); render(); }
  });
  rec.onClose = () => { if (TAB === 'inv') render(); };
}

/* — countdown / room / category / move editors — */
function countdownSheet(){
  const rec = openSheet(`
    ${sheetHead('Geri sayım')}

function roomSheet(rid){
  const r = rid ? room(rid) : null;
  let color = r?.color || ROOM_COLORS[roomsA().length % ROOM_COLORS.length];
  const cnt = r ? roomProds(r.id).length : 0;
  const rec = openSheet(`
    ${sheetHead(r ? 'Odayı düzenle' : 'Oda ekle')}
    <div class="sh-b">
      <div class="fld"><label>Oda adı</label><input class="inp" id="rm-nm" value="${esc(r?.name || '')}" placeholder="ör. Balkon"></div>

      <button class="btn" id="rm-ok">${r ? 'Kaydet' : 'Ekle'}</button>
      ${r ? `<button class="btn danger" id="rm-del">${I.trash} Odayı sil${cnt ? ` · ${cnt} ürün var` : ''}</button>` : ''}
    </div>`);
  let icon = r?.icon || 'home';
  const paint = () => {
    $('#rm-cl', rec.sh).innerHTML = ROOM_COLORS.map(c =>
      `<button data-cl="${c}" style="width:38px;height:38px;border-radius:12px;background:${c};border:${c === color ? '2.5px solid var(--ink)' : '1px solid var(--line-2)'}"></button>`).join('');
    $('#rm-ic', rec.sh).innerHTML = Object.keys(RICONS).map(k =>
      `<button class="pill ${k === icon ? 'on' : ''}" data-ric="${k}" style="padding:7px 9px">${RICONS[k]}</button>`).join('');
  };
  paint();
  rec.sh.addEventListener('click', e => {
    const c = e.target.closest('[data-cl]'); if (c){ color = c.dataset.cl; paint(); return; }

  });
  $('#rm-ok', rec.sh).addEventListener('click', () => {
    const nm = $('#rm-nm', rec.sh).value.trim(); if (!nm) return;

  if (r) $('#rm-del', rec.sh)?.addEventListener('click', () => {
    if (cnt){ toast('Önce üründeki ' + cnt + ' ürünü taşı veya sil'); return; }

      r.deleted = now(); touch(r);
      catsA(r.id).forEach(c => { c.deleted = now(); touch(c); });
      if (invRoom === r.id) invRoom = null;
      save(); closeSheet(rec);

function catSheet(roomId, cid){

/* — insight result list — */
function insListSheet(ids){
  const list = ids.map(prod).filter(Boolean).filter(alive);
  const rec = openSheet(`
    ${sheetHead('Akıllı not', list.length + ' ürün')}
    <div class="sh-b"><div class="plist">${list.map(p => prodRow(p, { ctx:true })).join('')}</div></div>`);
  rec.sh.addEventListener('click', e => {
    const t = e.target.closest('[data-tick]'); if (t){ e.stopPropagation(); toggleTick(t, e); return; }
    const pr = e.target.closest('[data-prod]'); if (pr){ closeSheet(rec); productSheet(pr.dataset.prod); }
  });
}
function monthSheet(mi){
  const ym = idxYm(mi);
  const list = prodsA()
    .filter(p => isBought(p) && p.instCount && p.price != null && p.instStart)
    .map(p => ({ p, fo: finOf(p), s: ymIdx(p.instStart) }))
    .filter(x => mi >= x.s && mi < x.s + x.p.instCount)
    .sort((a,b) => b.fo.monthly - a.fo.monthly);
  const tot = list.reduce((a,x) => a + x.fo.monthly, 0);
  const byCard = {};
  list.forEach(x => { const c = x.p.card || 'Kart yok'; byCard[c] = (byCard[c] || 0) + x.fo.monthly; });
  const title = new Date(ym + '-01T00:00:00').toLocaleDateString('tr-TR', { month:'long', year:'numeric' });
  const rec = openSheet(`
    ${sheetHead(title, list.length ? `${list.length} taksit · ${fmtMoney(tot)}` : 'Bu ay planlı ödeme yok')}
    <div class="sh-b">
      ${list.length ? `
      <div class="pill-row" style="margin-bottom:14px">${Object.entries(byCard).map(([c,v]) =>
        `<span class="pill on" style="background:var(--wash);color:var(--ink-2)">${esc(c)} · ${fmtMoney(v)}</span>`).join('')}</div>
      <div class="plist">${list.map(x => `
        <button class="prow" data-mprod="${x.p.id}">
          <span class="bd">
            <span class="nm">${esc(x.p.name)}</span>
            <span class="mt">${esc(x.p.card || 'Kart yok')} · ${mi - x.s + 1}/${x.p.instCount}. taksit</span>
          </span>
          <span class="pr">${fmtMoney(x.fo.monthly)}</span>
        </button>`).join('')}</div>`
      : `<div class="empty" style="padding:18px"><img class="brandmark dim" src="${BRAND}" alt=""><div class="d">Bu aya düşen taksit yok.</div></div>`}
    </div>`);
  rec.sh.addEventListener('click', e => {
    const b = e.target.closest('[data-mprod]');
    if (b){ closeSheet(rec); productSheet(b.dataset.mprod); }
  });
}

function importSheet(data){
  const n = { p: data.products.filter(x => !x.deleted).length, r: data.rooms.filter(x => !x.deleted).length };
  const rec = openSheet(`
    ${sheetHead('Yedeği geri yükle', `${n.r} oda · ${n.p} ürün`)}
    <div class="sh-b">
      <p style="font-size:13px;color:var(--ink-2);line-height:1.55;margin-bottom:16px">
        <b>Birleştir:</b> her kayıt için en son düzenlenen kazanır, hiçbir şey silinmez.<br>
        <b>Birebir geri yükle:</b> bu cihazdaki veri tamamen yedektekiyle değiştirilir.</p>
      <div class="two">
        <button class="btn ghost" id="imp-merge">Birleştir</button>
        <button class="btn" id="imp-replace">Birebir geri yükle</button>
      </div>
    </div>`);
  $('#imp-merge', rec.sh).addEventListener('click', () => {
    const r = Sync.mergeRemote(data);
    persistNow(); applyTheme(); render(); closeSheet(rec);
    toast(r.changedLocal ? 'Yedek birleştirildi ' + sparkTxt : 'Yedek zaten güncel');
  });
  $('#imp-replace', rec.sh).addEventListener('click', () => {
    const keepCid = S.settings.clientId;
    data.tagBank = Array.isArray(data.tagBank) ? data.tagBank : [];
    data.cats = Array.isArray(data.cats) ? data.cats : [];
    data.meta = { installedAt: now(), deviceId: uid(), ...(data.meta || {}), welcomed: true };
    data.settings = { title:'Şehre Dönüş', date:'2028-02-01', currency:'₺', theme:'system', clientId:'', ...(data.settings || {}) };
    if (!data.settings.clientId) data.settings.clientId = keepCid;
    data.lastSync = 0;
    S = migrate(data);
    persistNow(); applyTheme(); render(); closeSheet(rec);
    toast('Yedek birebir geri yüklendi ' + sparkTxt);
  });
}

function toggleTick(el, e){
  const p = prod(el.dataset.tick); if (!p) return;
  if (isDone(p)) setStatus(p, p.prevStatus && p.prevStatus !== 'tamam' ? p.prevStatus : 'ihtiyac');
  else setStatus(p, 'tamam', e);
}

<script>
/* ═══════════════════ RENDER DISPATCH + WIRING ═══════════════════ */
function render(){
  renderNav();
  $('#app').innerHTML = ({ home:renderHome, inv:renderInv, wish:renderWish, fin:renderFin, set:renderSet })[TAB]();
  wireInv();
}
function wireInv(){
  if (TAB !== 'inv') return;
  const rs = $('#room-sort');
  if (rs) makeSortable(rs, '.frow', ids => { ids.forEach((id, i) => { const r = room(id); if (r){ r.order = i; touch(r); } }); save({ silent:true }); });
  const cs = $('#cat-sort');
  if (cs) makeSortable(cs, '.catblock', ids => { ids.forEach((id, i) => { const c = cat(id); if (c){ c.order = i; touch(c); } }); save({ silent:true }); });
  $$('[data-psort]', $('#app')).forEach(pl =>
    makeSortable(pl, '.prow', ids => { ids.forEach((id, i) => { const p = prod(id); if (p){ p.order = i; touch(p); } }); save({ silent:true }); }));
}
const qPaint = debounce(() => { const b = $('#inv-body'); if (b){ b.innerHTML = invBody(); wireInv(); } }, 160);

/* ——— global delegation (sheets handle their own clicks) ——— */
function onClick(e){
  if (e.target.closest('.sheet') || e.target.closest('.veil')) return;

  const tab = e.target.closest('[data-tab]');   if (tab){ go(tab.dataset.tab); return; }
  const gg  = e.target.closest('[data-go]');    if (gg){ go(gg.dataset.go); return; }
  if (e.target.closest('#fab')){ quickAdd(); return; }

  const tk = e.target.closest('[data-tick]');   if (tk){ toggleTick(tk, e); return; }
  const pr = e.target.closest('[data-prod]');   if (pr){ productSheet(pr.dataset.prod); return; }
  const mo = e.target.closest('[data-mon]');    if (mo){ monthSheet(+mo.dataset.mon); return; }
  const rm = e.target.closest('[data-room]');   if (rm){ invRoom = rm.dataset.room; TAB === 'inv' ? render() : go('inv'); return; }
  const ins= e.target.closest('[data-ins]');    if (ins){ try { insListSheet(JSON.parse(ins.dataset.ins)); } catch(_){} return; }

  if (e.target.closest('#wel-ok')){ S.meta.welcomed = true; touch(S.meta); save(); return; }
  if (e.target.closest('#ed-count')){ countdownSheet(); return; }
  if (e.target.closest('#add-room')){ roomSheet(); return; }
  if (e.target.closest('#sort-rooms') || e.target.closest('#sort-toggle')){ sortMode = !sortMode; render(); return; }
  if (e.target.closest('#back-rooms')){ invRoom = null; sortMode = false; render(); return; }
  const er = e.target.closest('[data-edroom]'); if (er){ roomSheet(er.dataset.edroom); return; }
  const ac = e.target.closest('[data-addcat]'); if (ac){ catSheet(ac.dataset.addcat); return; }
  const ec = e.target.closest('[data-edcat]');  if (ec){ const c = cat(ec.dataset.edcat); if (c) catSheet(c.roomId, c.id); return; }
  if (e.target.closest('#open-f')){ filterSheet(); return; }
  if (e.target.closest('#clear-f')){ F.q=''; F.status=[]; F.prio=[]; F.tags=[]; F.acq=[]; F.roomId=null; render(); return; }

  if (handleAltClick(e)) return;

  const th = e.target.closest('[data-theme-set]'); if (th){ S.settings.theme = th.dataset.themeSet; touch(S.settings); applyTheme(); save(); return; }
  const il = e.target.closest('[data-inclow]');   if (il){ S.settings.includeLow = il.dataset.inclow === '1'; touch(S.settings); save(); return; }
  const cu = e.target.closest('[data-cur]');       if (cu){ S.settings.currency = cu.dataset.cur; touch(S.settings); save(); return; }
  if (e.target.closest('#sync-save')){ S.settings.clientId = ($('#cid')?.value || '').trim(); touch(S.settings); persistNow(); toast('Kaydedildi'); render(); return; }
  if (e.target.closest('#sync-on')){ Sync.connect(true); return; }
  if (e.target.closest('#sync-off')){ Sync.disconnect(); return; }
  if (e.target.closest('#exp-json')){ exportJSON(); return; }
  if (e.target.closest('#imp-json')){ $('#imp-file')?.click(); return; }
  if (e.target.closest('#reset-all')){
    const rec = openSheet(`
      ${sheetHead('Her şeyi sıfırla', 'Bu cihazdaki tüm veri silinir')}
      <div class="sh-b">
        <p style="font-size:13px;color:var(--ink-2);line-height:1.55;margin-bottom:16px">Tüm odalar, ürünler ve ayarlar <b>bu cihazdan</b> silinir. Drive yedeğin varsa oradan dönebilirsin — emin değilsen önce dosyayı indir.</p>
        <button class="btn ghost" id="rs-exp">Önce yedeği indir</button>
        <button class="btn danger" id="rs-go" style="margin-top:10px">${I.trash} Sıfırla</button>
      </div>`);
    $('#rs-exp', rec.sh).addEventListener('click', () => { exportJSON(); toast('Yedek indirildi ' + sparkTxt); });
    $('#rs-go', rec.sh).addEventListener('click', () => {
      S = freshState(); S.meta.welcomed = true; persistNow(); render(); closeSheet(rec); toast('Sıfırlandı');
    });
    return;
  }
}
function onInput(e){
  if (e.target.id === 'q'){ F.q = e.target.value; qPaint(); }
}
function onChange(e){
  if (e.target.id === 'imp-file'){
    const file = e.target.files[0]; e.target.value = ''; if (!file) return;
    file.text().then(t => {
      const data = JSON.parse(t);
      if (!data || !Array.isArray(data.rooms) || !Array.isArray(data.products)) throw 0;
      importSheet(data);
    }).catch(() => toast('Dosya okunamadı — geçerli bir yedek değil'));
  }
}

/* ——— theme ——— */
const mq = matchMedia('(prefers-color-scheme: dark)');
function applyTheme(){
  const t = S.settings.theme || 'system';
  document.documentElement.dataset.theme = t === 'system' ? (mq.matches ? 'dark' : 'light') : t;
  const m = document.querySelector('meta[name="theme-color"]');
  if (m) m.content = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
}
mq.addEventListener?.('change', () => { if (S?.settings.theme === 'system') applyTheme(); });

/* ——— export ——— */
function exportJSON(){
  const blob = new Blob([JSON.stringify(S, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gelecek-envanteri-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
}
</script>
<script>
/* ═══════════════════ GOOGLE DRIVE SYNC ═══════════════════ */
const Sync = {
  status: 'off',
  lastAt: +(store.read('ge_lastsync') || 0),
  fileId: store.read('ge_fileid') || null,
  token: null, exp: 0, tc: null, pushT: null, gsiP: null, busy: false,

  enabled(){ return store.read('ge_sync') === '1'; },
  authValid(){ return this.token && Date.now() < this.exp - 30e3; },
  setStatus(s){ this.status = s; if (TAB === 'set') render(); },

  loadGsi(){
    if (window.google?.accounts?.oauth2) return Promise.resolve();
    if (this.gsiP) return this.gsiP;
    this.gsiP = new Promise((res, rej) => {
      const sc = document.createElement('script');
      sc.src = 'https://accounts.google.com/gsi/client';
      sc.onload = res; sc.onerror = () => rej(new Error('gsi yüklenemedi'));
      document.head.appendChild(sc);
    });
    return this.gsiP;
  },

  standalone(){ return matchMedia('(display-mode: standalone)').matches || navigator.standalone === true; },

  authUrl(){
    const nonce = uid();
    store.write('ge_oauth_state', nonce);
    return 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({
      client_id: S.settings.clientId,
      redirect_uri: location.origin + location.pathname,
      response_type: 'token',
      scope: 'https://www.googleapis.com/auth/drive.appdata',
      include_granted_scopes: 'true',
      state: nonce,
    });
  },

  redirectConnect(){
    store.write('ge_sync', '1');                    /* dönüşte niyeti hatırla */
    persistNow();
    location.assign(this.authUrl());
  },

  consumeRedirect(hash){
    hash = hash ?? location.hash;
    if (!hash || hash.length < 2) return false;
    const q = new URLSearchParams(hash.slice(1));
    const tok = q.get('access_token');
    if (!tok) return false;
    const want = store.read('ge_oauth_state');
    if (want && q.get('state') !== want) return false;
    store.del('ge_oauth_state');
    this.token = tok;
    this.exp = Date.now() + (parseInt(q.get('expires_in'), 10) || 3600) * 1000;
    try { history.replaceState(null, '', location.pathname + location.search); } catch(_){}
    return true;
  },

  getToken(interactive){
    if (this.standalone()){
      if (interactive){ this.redirectConnect(); return Promise.reject(new Error('redirecting')); }
      return Promise.reject(new Error('noauth'));   /* PWA'da sessiz yenileme yok; rozetle iste */
    }
    return this.loadGsi().then(() => new Promise((res, rej) => {
      this.tc = google.accounts.oauth2.initTokenClient({
        client_id: S.settings.clientId,
        scope: 'https://www.googleapis.com/auth/drive.appdata',
        callback: t => {
          if (t.error) return rej(new Error(t.error));
          this.token = t.access_token;
          this.exp = Date.now() + (t.expires_in || 3600) * 1000;
          res();
        },
        error_callback: err => rej(new Error(err?.type || 'auth')),
      });
      this.tc.requestAccessToken({ prompt: '' });
    })).catch(err => {
      if (interactive){ this.redirectConnect(); throw new Error('redirecting'); }
      throw err;
    });
  },

  async connect(interactive){
    if (!S.settings.clientId){ toast('Önce Client ID gir — adımlar README’de'); return; }
    if (this.busy) return; this.busy = true;
    this.setStatus('syncing');
    try {
      if (!this.authValid()) await this.getToken(interactive);
      store.write('ge_sync', '1');
      await this.fullSync();
      this.setStatus('ok');
      if (interactive) toast('Drive bağlandı ' + sparkTxt);
    } catch (err) {
      if (err && err.message === 'redirecting') return;   /* Google'a gidiyoruz, sayfa değişiyor */
      console.warn('sync', err);
      this.setStatus(interactive ? 'error' : 'noauth');
      if (interactive) toast('Bağlanamadı — Client ID ve Redirect URI ayarını kontrol et');
    } finally { this.busy = false; }
  },

  disconnect(){
    store.del('ge_sync'); store.del('ge_fileid');
    this.token = null; this.fileId = null;
    this.setStatus('off'); toast('Bağlantı kesildi — veriler cihazda duruyor');
  },

  async api(url, opts = {}){
    const r = await fetch(url, { ...opts, headers: { Authorization: 'Bearer ' + this.token, ...(opts.headers || {}) } });
    if (r.status === 401){ this.token = null; this.setStatus('noauth'); throw new Error('401'); }
    if (!r.ok) throw new Error('drive ' + r.status);
    return r;
  },

  async ensureFile(){
    if (this.fileId) return;
    const q = encodeURIComponent("name='ge-data.json'");
    const r = await this.api(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id)`);
    const { files } = await r.json();
    if (files?.length){ this.fileId = files[0].id; }
    else {
      const meta = JSON.stringify({ name:'ge-data.json', parents:['appDataFolder'] });
      const body = `--geb\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--geb\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(S)}\r\n--geb--`;
      const c = await this.api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method:'POST', headers:{ 'Content-Type':'multipart/related; boundary=geb' }, body });
      this.fileId = (await c.json()).id;
      this.stamp();
    }
    store.write('ge_fileid', this.fileId);
  },

  async pull(){
    const r = await this.api(`https://www.googleapis.com/drive/v3/files/${this.fileId}?alt=media`);
    let remote = null;
    try { remote = await r.json(); } catch(_){ return { aheadLocal:true }; }
    return this.mergeRemote(remote);
  },

  async push(){
    if (!this.enabled() || !S.settings.clientId) return;
    if (!this.authValid()){
      try { await this.getToken(false); } catch(_) { this.setStatus('noauth'); return; }
    }
    try {
      await this.ensureFile();
      /* purge tombstones older than 60 days before upload */
      const cut = now() - 60 * 864e5;
      ['rooms','cats','products'].forEach(k => S[k] = S[k].filter(x => !x.deleted || x.deleted > cut));
      await this.api(`https://www.googleapis.com/upload/drive/v3/files/${this.fileId}?uploadType=media`, {
        method:'PATCH', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(S), keepalive:true });
      this.stamp();
      this.setStatus('ok');
    } catch (err) { console.warn('push', err); if (this.status !== 'noauth') this.setStatus('error'); }
  },

  async fullSync(){
    await this.ensureFile();
    const r = await this.pull();
    if (r.changedLocal){ persistNow(); render(); toast('Drive’dan güncellendi ' + sparkTxt); }
    if (r.aheadLocal) await this.push(); else this.stamp();
  },

  stamp(){ this.lastAt = Date.now(); store.write('ge_lastsync', String(this.lastAt)); },

  queue(){
    if (!this.enabled() || !S.settings.clientId) return;
    clearTimeout(this.pushT);
    this.pushT = setTimeout(() => this.push(), 4000);
  },

  /* entity-level last-write-wins merge; returns what changed on each side */
  mergeRemote(remote){
    migrate(remote);                                    /* uzak kopya v1 olabilir (eski yedek/Drive) */
    let changedLocal = false, aheadLocal = false;
    const mergeArr = key => {
      const loc = new Map((S[key] || []).map(x => [x.id, x]));
      const rem = new Map((remote[key] || []).map(x => [x.id, x]));
      const out = [];
      for (const [id, l] of loc){
        const r = rem.get(id);
        if (!r){ out.push(l); aheadLocal = true; continue; }
        if ((r.updatedAt || 0) > (l.updatedAt || 0)){ out.push(r); changedLocal = true; }
        else { out.push(l); if ((l.updatedAt || 0) > (r.updatedAt || 0)) aheadLocal = true; }
      }
      for (const [id, r] of rem) if (!loc.has(id)){ out.push(r); changedLocal = true; }
      S[key] = out;
    };
    ['rooms','cats','products','tagBank'].forEach(mergeArr);
    if (remote.settings){
      if ((remote.settings.updatedAt || 0) > (S.settings.updatedAt || 0)){ S.settings = { ...S.settings, ...remote.settings }; changedLocal = true; applyTheme(); }
      else if ((S.settings.updatedAt || 0) > (remote.settings.updatedAt || 0)) aheadLocal = true;
    }
    if (remote.meta?.welcomed) S.meta.welcomed = true;
    return { changedLocal, aheadLocal };
  },
};

/* flush pending push when app goes to background */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && Sync.pushT){
    clearTimeout(Sync.pushT); Sync.pushT = null;
    if (Sync.authValid()) Sync.push();
  }
});

/* ═══════════════════ BOOT ═══════════════════ */
load();
applyTheme();
render();
(() => {
  const sp = $('#splash'); if (!sp) return;
  sp.querySelector('.bm').src = BRAND;
  const standalone = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  if (!standalone){ sp.remove(); return; }
  setTimeout(() => { sp.classList.add('out'); setTimeout(() => sp.remove(), 420); }, 430);
})();
navigator.storage?.persist?.().catch(() => {});   /* iOS: alan sıkışınca veriyi süpürme */
document.addEventListener('click', onClick);
document.addEventListener('input', onInput);
document.addEventListener('change', onChange);
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost'))
  navigator.serviceWorker.register('./sw.js').catch(() => {});
if (Sync.consumeRedirect()){
  store.write('ge_sync', '1');
  Sync.setStatus('syncing');
  Sync.fullSync()
    .then(() => { Sync.setStatus('ok'); toast('Drive bağlandı ' + sparkTxt); })
    .catch(e => { console.warn('sync', e); Sync.setStatus('error'); toast('Bağlandı ama ilk eşitleme takıldı — tekrar dene'); });
} else if (Sync.enabled() && S.settings.clientId) setTimeout(() => Sync.connect(false), 900);
</script>
